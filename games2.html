<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bean Arcade 🕹️</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#5a9e6a;
  background-image:radial-gradient(circle,rgba(255,255,255,0.13) 1.5px,transparent 1.5px);
  background-size:22px 22px;
  font-family:'Nunito','PingFang SC','Microsoft YaHei',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:12px 8px 28px;gap:9px;user-select:none;
}
.mode-bar{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;background:rgba(255,255,255,0.38);padding:5px;border-radius:30px;box-shadow:0 3px 14px rgba(0,0,0,0.13)}
.mode-btn{padding:8px 18px;border-radius:24px;border:none;background:transparent;cursor:pointer;font-size:14px;font-weight:800;font-family:inherit;color:#1a4a2a;transition:all .2s;white-space:nowrap}
.mode-btn:hover{background:rgba(255,255,255,0.5)}
.mode-btn.active{background:linear-gradient(135deg,#1a4a2a,#2e7a44);color:#fff;box-shadow:0 2px 10px rgba(20,70,30,.35)}
.header{display:flex;align-items:center;gap:12px}
.header-group{display:flex;flex-direction:column;align-items:flex-start}
.title{font-size:22px;font-weight:900;background:linear-gradient(135deg,#1a4a2a,#2e7a44);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.title-sub{font-size:11px;color:rgba(20,70,30,.55);font-weight:600;margin-top:-1px}
.header-btns{display:flex;gap:7px;align-items:center}
.header-btn{padding:5px 13px;border-radius:20px;border:2px solid rgba(255,255,255,0.7);background:rgba(255,255,255,0.55);cursor:pointer;font-size:13px;color:#1a4a2a;font-weight:700;font-family:inherit;box-shadow:0 2px 6px rgba(0,0,0,0.1);transition:all .15s}
.header-btn:hover{background:rgba(255,255,255,0.8);transform:translateY(-1px)}
.nav-link{font-size:12px;color:rgba(255,255,255,0.85);font-weight:700;text-decoration:none;padding:4px 12px;border-radius:14px;background:rgba(255,255,255,0.2);transition:all .15s}
.nav-link:hover{background:rgba(255,255,255,0.35)}
.score-bar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:center;background:rgba(255,255,255,0.92);padding:10px 22px;border-radius:36px;box-shadow:0 3px 14px rgba(0,0,0,0.13)}
.score-item{display:flex;align-items:center;gap:8px}
.score-lbl{color:#4a8a5a;font-size:13px;font-weight:700}
.score-val{font-size:26px;font-weight:900;color:#1a4a2a;min-width:36px;text-align:center;line-height:1}
.turn-pill{padding:5px 14px;border-radius:20px;border:2.5px solid #a0d0a8;background:#f0fff4;font-size:13px;color:#1a5a2a;font-weight:700;white-space:nowrap;transition:all .2s}
.turn-pill.over{border-color:#e04040;background:#fff0f0;color:#c03030}
.turn-pill.pulse{animation:pulse .7s ease-in-out infinite alternate}
@keyframes pulse{from{opacity:.7}to{opacity:1}}
.board-wrap{border-radius:18px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.3),0 2px 6px rgba(0,0,0,0.12);border:3px solid rgba(255,255,255,0.28)}
#cvs{display:block;cursor:pointer}
.controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center}
.ctrl-row{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
.ctrl-btn{padding:8px 17px;border-radius:22px;border:2px solid rgba(255,255,255,0.7);background:rgba(255,255,255,0.75);cursor:pointer;font-size:13px;color:#1a4a2a;font-weight:700;font-family:inherit;box-shadow:0 2px 6px rgba(0,0,0,0.09);transition:all .15s}
.ctrl-btn:hover:not(:disabled){background:rgba(255,255,255,0.95);transform:translateY(-1px)}
.ctrl-btn:disabled{opacity:.35;cursor:not-allowed}
.ctrl-btn.primary{background:linear-gradient(135deg,#1a4a2a,#2e7a44);color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(20,70,30,.35)}
.ctrl-btn.primary:hover{background:linear-gradient(135deg,#2a6a3a,#3e9a54);transform:translateY(-1px)}
/* Snake direction pad */
.dpad{display:grid;grid-template-columns:repeat(3,44px);grid-template-rows:repeat(2,44px);gap:4px}
.dpad-btn{width:44px;height:44px;border-radius:12px;border:2px solid rgba(255,255,255,0.7);background:rgba(255,255,255,0.75);cursor:pointer;font-size:20px;font-family:inherit;color:#1a4a2a;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,0.1);transition:all .12s}
.dpad-btn:active{transform:scale(.92);background:rgba(255,255,255,0.95)}
.dpad-btn.hidden{visibility:hidden}
/* overlay */
.overlay{position:fixed;inset:0;background:rgba(20,70,30,.28);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(3px)}
.overlay.hidden{display:none}
.modal{background:#fff;border-radius:28px;padding:32px 38px;text-align:center;box-shadow:0 12px 56px rgba(0,0,0,.28);min-width:280px}
.modal-emoji{font-size:54px;margin-bottom:8px;animation:bounce .5s ease infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-8px)}}
.modal-title{font-size:24px;font-weight:900;color:#2a8a40;margin-bottom:6px}
.modal-title.lose{color:#c03030}
.modal-sub{font-size:14px;color:#8aaa70;font-weight:700;margin-bottom:22px}
.modal-btns{display:flex;gap:10px;justify-content:center}
.modal-btn{padding:10px 22px;border-radius:22px;border:2px solid #c0dcc0;background:#fff;cursor:pointer;font-size:15px;font-family:inherit;font-weight:700;color:#1a4a2a;transition:all .15s}
.modal-btn:hover{background:#f0fff4;transform:translateY(-1px)}
.modal-btn.primary{background:linear-gradient(135deg,#1a4a2a,#2e7a44);color:#fff;border-color:transparent;box-shadow:0 3px 12px rgba(20,70,30,.3)}
.tip-overlay{position:fixed;inset:0;background:rgba(20,70,30,.25);display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(3px)}
.tip-overlay.hidden{display:none}
.tip-box{background:#fff;border-radius:22px;padding:24px 28px;max-width:320px;text-align:left;line-height:1.75;font-size:14px;color:#1a4a2a;font-family:inherit;font-weight:600;box-shadow:0 10px 44px rgba(0,0,0,.2)}
.tip-box h3{margin-bottom:10px;font-size:17px;color:#1a4a2a;font-weight:900}
.tip-close-btn{display:block;margin-top:14px;padding:10px;text-align:center;background:linear-gradient(135deg,#1a4a2a,#2e7a44);color:#fff;border-radius:16px;border:none;cursor:pointer;width:100%;font-size:14px;font-family:inherit;font-weight:700}
/* Power-up legend */
#puLegend{
  display:none;flex-wrap:wrap;gap:5px;justify-content:center;
  max-width:560px;
}
.pu-leg{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,0.78);
  padding:5px 10px;border-radius:14px;
  font-size:12px;font-weight:800;color:#1a4a2a;
  white-space:nowrap;box-shadow:0 1px 5px rgba(0,0,0,0.08);
}
.pu-leg.bad{background:rgba(255,100,100,0.22);color:#8a2020;}
.pu-leg-ico{font-size:16px;line-height:1;}
.pu-leg-desc{font-size:11px;font-weight:600;color:#4a7a5a;margin-top:1px;}
.pu-leg.bad .pu-leg-desc{color:#c04040;}
/* Speed selector */
.speed-bar{display:flex;gap:4px;background:rgba(255,255,255,0.35);padding:4px;border-radius:24px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.speed-btn{padding:5px 12px;border-radius:20px;border:none;background:transparent;cursor:pointer;font-size:12px;color:#1a4a2a;font-weight:800;font-family:inherit;transition:all .18s}
.speed-btn:hover{background:rgba(255,255,255,0.5)}
.speed-btn.active{background:#2e7a44;color:#fff;box-shadow:0 2px 8px rgba(30,100,50,.32)}
/* Side D-pad buttons */
.dpad-side{
  width:58px;height:58px;border-radius:50%;
  border:2.5px solid rgba(255,255,255,0.75);
  background:rgba(255,255,255,0.78);
  cursor:pointer;font-size:26px;
  color:#1a4a2a;font-weight:900;
  display:none;align-items:center;justify-content:center;
  box-shadow:0 3px 14px rgba(0,0,0,0.18);
  transition:all .1s;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.dpad-side:active{transform:scale(.87);background:rgba(255,255,255,0.97);box-shadow:0 1px 4px rgba(0,0,0,0.12)}
#boardRow{display:flex;align-items:center;gap:10px}
#dpadUpDown{display:flex;flex-direction:column;align-items:center;gap:6px}
</style>
</head>
<body>

<div class="mode-bar">
  <button class="mode-btn active" data-mode="snake">🐍 <span data-k="modeSnake">Snake</span></button>
  <button class="mode-btn" data-mode="match3">💎 <span data-k="modeMatch3">Match 3</span></button>
  <button class="mode-btn" data-mode="lian">🀄 <span data-k="modeLian">Connect</span></button>
  <button class="mode-btn" data-mode="mole">🐹 <span data-k="modeMole">Whack-a-Mole</span></button>
</div>

<div class="header">
  <div class="header-group">
    <h1 class="title" id="mainTitle">Bean Arcade 🕹️</h1>
    <div class="title-sub" id="mainSub">Classic fun games!</div>
  </div>
  <div class="header-btns">
    <button class="header-btn" id="langBtn" onclick="toggleLang()">中</button>
    <button class="header-btn" onclick="showTip()">?</button>
    <a class="nav-link" href="kids.html">🎮 Kids</a>
    <a class="nav-link" href="index.html">🎴 Board</a>
  </div>
</div>

<div class="score-bar" id="scoreBar">
  <div class="score-item"><div class="score-lbl" data-k="score">Score</div><div class="score-val" id="scoreVal">0</div></div>
  <div class="score-item"><div class="score-lbl" data-k="best">Best</div><div class="score-val" id="bestVal">0</div></div>
  <div class="score-item" id="m3MovesItem" style="display:none"><div class="score-lbl" id="m3MovesLbl">Moves</div><div class="score-val" id="m3MovesVal">25</div></div>
  <div class="turn-pill" id="turnPill">▶ Ready</div>
</div>

<!-- ▲ Up button (snake only) -->
<button class="dpad-side" id="dpadUp" onclick="snakeDir(0,-1)">▲</button>

<!-- Board row: ◀ | canvas | ▶ -->
<div id="boardRow">
  <button class="dpad-side" id="dpadLeft" onclick="snakeDir(-1,0)">◀</button>
  <div class="board-wrap" id="boardWrap">
    <canvas id="cvs"></canvas>
  </div>
  <button class="dpad-side" id="dpadRight" onclick="snakeDir(1,0)">▶</button>
</div>

<!-- ▼ Down button (snake only) -->
<button class="dpad-side" id="dpadDown" onclick="snakeDir(0,1)">▼</button>

<!-- Power-up legend (snake only) -->
<div id="puLegend">
  <div class="pu-leg"><span class="pu-leg-ico">⚡</span><div><div>Speed Up</div><div class="pu-leg-desc">4s faster</div></div></div>
  <div class="pu-leg"><span class="pu-leg-ico">🐢</span><div><div>Slow Mo</div><div class="pu-leg-desc">5s slower</div></div></div>
  <div class="pu-leg"><span class="pu-leg-ico">✂️</span><div><div>Snip!</div><div class="pu-leg-desc">half length +2</div></div></div>
  <div class="pu-leg"><span class="pu-leg-ico">⭐</span><div><div>Bonus</div><div class="pu-leg-desc">+5 pts</div></div></div>
  <div class="pu-leg"><span class="pu-leg-ico">🛡️</span><div><div>Shield</div><div class="pu-leg-desc">pass wall ×1</div></div></div>
  <div class="pu-leg bad"><span class="pu-leg-ico">💣</span><div><div>Bomb!</div><div class="pu-leg-desc">avoid! −2 pts</div></div></div>
</div>

<div class="controls" id="controls">
  <div class="ctrl-row" id="snakeSpeed" style="display:none">
    <div class="speed-bar">
      <button class="speed-btn active" data-spd="180" onclick="setSnakeSpeed(this)">🐢 <span data-k="slow">Slow</span></button>
      <button class="speed-btn" data-spd="120" onclick="setSnakeSpeed(this)">🐇 <span data-k="fast">Fast</span></button>
      <button class="speed-btn" data-spd="70" onclick="setSnakeSpeed(this)">⚡ <span data-k="turbo">Turbo</span></button>
    </div>
  </div>
  <div class="ctrl-row" id="m3Diff" style="display:none">
    <div class="speed-bar">
      <button class="speed-btn" data-diff="easy" onclick="setM3Diff(this)">🌱 <span data-k="m3Easy">Easy</span></button>
      <button class="speed-btn active" data-diff="medium" onclick="setM3Diff(this)">🎯 <span data-k="m3Med">Medium</span></button>
      <button class="speed-btn" data-diff="hard" onclick="setM3Diff(this)">🔥 <span data-k="m3Hard">Hard</span></button>
    </div>
  </div>
  <div class="ctrl-row">
    <button class="ctrl-btn primary" onclick="newGame()">✨ <span data-k="newGame">New Game</span></button>
  </div>
</div>

<div class="overlay hidden" id="winOverlay">
  <div class="modal">
    <div class="modal-emoji" id="winEmoji">🎉</div>
    <div class="modal-title" id="winTitle">You Win!</div>
    <div class="modal-sub" id="winSub"></div>
    <div class="modal-btns">
      <button class="modal-btn primary" onclick="newGame();closeModal()">✨ <span data-k="again">Play Again</span></button>
    </div>
  </div>
</div>

<div class="tip-overlay hidden" id="tipOverlay">
  <div class="tip-box">
    <h3 id="tipTitle">How to Play</h3>
    <div id="tipBody"></div>
    <button class="tip-close-btn" onclick="closeTip()"><span data-k="tipClose">Got it!</span></button>
  </div>
</div>

<script>
'use strict';

// ── Translations ──────────────────────────────────────────────────────────────
const TI={
  en:{
    modeSnake:'Snake', modeMatch3:'Match 3', modeLian:'Connect', modeMole:'Whack-a-Mole',
    score:'Score', best:'Best', newGame:'New Game', again:'Play Again', tipClose:'Got it!',
    slow:'Slow', fast:'Fast', turbo:'Turbo', m3Easy:'Easy', m3Med:'Medium', m3Hard:'Hard', m3Moves:'Moves',
    ready:'▶ Ready', playing:'Playing!', gameOver:'Game Over', youWin:'You Win! 🎉',
    tipSnake:'<b>Snake:</b> Arrow keys / WASD / D-pad to steer. Eat 🍎 to grow!<br><br>Power-ups appear and vanish (blink = almost gone!):<br>⚡ Speed Up &nbsp; 🐢 Slow Mo &nbsp; ✂️ Snip (shorter)<br>⭐ +5 pts &nbsp; 🛡️ Shield (pass wall once) &nbsp; 💣 Bomb (avoid!)',
    tipMatch3:'<b>Match 3:</b> Click a gem, then click an adjacent gem to swap. Match 3 or more in a row/column to clear them! Score combos for bonus points.',
    tipLian:'<b>Connect:</b> Click two matching tiles that can be connected by a path with at most 2 turns (through empty space). Clear the board to win!',
    tipMole:'<b>Whack-a-Mole:</b> Click the moles before they hide! 30 seconds — score as high as you can. Speed increases over time!',
  },
  zh:{
    modeSnake:'贪吃蛇', modeMatch3:'三消', modeLian:'连连看', modeMole:'打地鼠',
    score:'分数', best:'最高分', newGame:'新游戏', again:'再来一局', tipClose:'好的！',
    slow:'慢速', fast:'快速', turbo:'极速', m3Easy:'简单', m3Med:'普通', m3Hard:'困难', m3Moves:'步数',
    ready:'▶ 准备', playing:'游戏中！', gameOver:'游戏结束', youWin:'你赢了！🎉',
    tipSnake:'<b>贪吃蛇：</b>方向键/WASD/虚拟键控制，吃🍎长大！<br><br>道具会出现然后消失（闪烁=快没了）：<br>⚡加速 &nbsp; 🐢减速 &nbsp; ✂️变短 &nbsp; ⭐+5分 &nbsp; 🛡️护盾（穿墙一次） &nbsp; 💣炸弹（要躲开！）',
    tipMatch3:'<b>三消：</b>点击一颗宝石，再点击相邻宝石来交换。连成3个以上相同的即可消除！',
    tipLian:'<b>连连看：</b>点击两张相同的牌，中间能以不超过2次转弯连通就消除。清空所有牌即胜！',
    tipMole:'<b>打地鼠：</b>30秒内点击钻出来的地鼠！速度越来越快，看能得多少分！',
  }
};
let lang='en';
const t=k=>TI[lang][k]||TI.en[k]||k;
function toggleLang(){lang=lang==='en'?'zh':'en';document.getElementById('langBtn').textContent=lang==='en'?'中':'EN';applyLang();}
function applyLang(){
  document.querySelectorAll('[data-k]').forEach(el=>el.textContent=t(el.getAttribute('data-k')));
  updatePill();
}

// ── State ─────────────────────────────────────────────────────────────────────
let mode='snake';
let G={};
let gameLoop=null;
let bests={snake:0, match3:0, lian:0, mole:0};
let m3Difficulty='medium';
const M3_MOVES={easy:40, medium:25, hard:15};

function setM3Diff(btn){
  document.querySelectorAll('#m3Diff .speed-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  m3Difficulty=btn.dataset.diff;
  newGame();
}
function m3UpdateMoves(){
  document.getElementById('m3MovesVal').textContent=G.moves;
}

const cvs=document.getElementById('cvs');
const ctx=cvs.getContext('2d');

// ── Mode switching ─────────────────────────────────────────────────────────────
document.querySelectorAll('.mode-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    mode=btn.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b===btn));
    stopLoop();
    setupMode();
    newGame();
  });
});

function stopLoop(){
  if(gameLoop){clearInterval(gameLoop);gameLoop=null;}
}

function setDpad(show){
  const flex='flex';
  ['dpadUp','dpadDown','dpadLeft','dpadRight'].forEach(id=>{
    document.getElementById(id).style.display=show?flex:'none';
  });
  document.getElementById('boardRow').style.justifyContent=show?'center':'';
  document.getElementById('puLegend').style.display=show?'flex':'none';
}

function setupMode(){
  const sub=document.getElementById('mainSub');
  const ss=document.getElementById('snakeSpeed');
  ss.style.display='none';
  document.getElementById('m3Diff').style.display='none';
  document.getElementById('m3MovesItem').style.display='none';
  setDpad(false);
  if(mode==='snake'){
    document.getElementById('mainTitle').textContent='Snake 🐍';
    sub.textContent=lang==='en'?'Eat, grow, survive!':'吃，长大，生存！';
    ss.style.display='flex';
    setDpad(true);
    document.onkeydown=onSnakeKey;
  } else if(mode==='match3'){
    document.getElementById('mainTitle').textContent='Match 3 💎';
    sub.textContent=lang==='en'?'Swap gems, match 3+!':'交换宝石，连消3个！';
    document.getElementById('m3Diff').style.display='flex';
    document.getElementById('m3MovesItem').style.display='';
    document.getElementById('m3MovesLbl').textContent=t('m3Moves');
    document.onkeydown=null;
  } else if(mode==='lian'){
    document.getElementById('mainTitle').textContent='Connect 🀄';
    sub.textContent=lang==='en'?'Connect matching tiles!':'连接相同的牌！';
    document.onkeydown=null;
  } else if(mode==='mole'){
    document.getElementById('mainTitle').textContent='Whack-a-Mole 🐹';
    sub.textContent=lang==='en'?'Hit the moles! 30s':'打地鼠！30秒';
    document.onkeydown=null;
  }
}

function newGame(){
  stopLoop();
  closeModal();
  if(mode==='snake') initSnake();
  else if(mode==='match3') initMatch3();
  else if(mode==='lian') initLian();
  else if(mode==='mole') initMole();
}
function closeModal(){document.getElementById('winOverlay').classList.add('hidden');}

function showWin(emoji,title,cls,sub=''){
  document.getElementById('winEmoji').textContent=emoji;
  const tt=document.getElementById('winTitle');
  tt.textContent=title; tt.className='modal-title'+(cls?' '+cls:'');
  document.getElementById('winSub').textContent=sub;
  document.getElementById('winOverlay').classList.remove('hidden');
}

function updateScore(s){
  document.getElementById('scoreVal').textContent=s;
  if(s>bests[mode]){bests[mode]=s;}
  document.getElementById('bestVal').textContent=bests[mode];
}
function updatePill(txt,cls=''){
  const p=document.getElementById('turnPill');
  p.textContent=txt||t('ready');
  p.className='turn-pill'+(cls?' '+cls:'');
}

function showTip(){
  const tips={snake:'tipSnake',match3:'tipMatch3',lian:'tipLian',mole:'tipMole'};
  document.getElementById('tipTitle').textContent=
    mode==='snake'?t('modeSnake'):mode==='match3'?t('modeMatch3'):mode==='lian'?t('modeLian'):t('modeMole');
  document.getElementById('tipBody').innerHTML=t(tips[mode]);
  document.getElementById('tipOverlay').classList.remove('hidden');
}
function closeTip(){document.getElementById('tipOverlay').classList.add('hidden');}

// ═══════════════════════════════════════════════════════════════════════════════
// SNAKE  (Power-up edition)
// ═══════════════════════════════════════════════════════════════════════════════
const SN_COLS=20, SN_ROWS=20, SN_CELL=26;
const SN_W=SN_COLS*SN_CELL, SN_H=SN_ROWS*SN_CELL;
let snakeBaseSpeed=180; // user-chosen base (ms per step)

// Power-up definitions
const POWERUPS=[
  {type:'fast',  emoji:'⚡', glow:'#ffd43b', label:'Speed Up!', timed:true,  secs:4},
  {type:'slow',  emoji:'🐢', glow:'#74c0fc', label:'Slow Mo!',  timed:true,  secs:5},
  {type:'short', emoji:'✂️', glow:'#f783ac', label:'Snip!',     timed:false, secs:0},
  {type:'star',  emoji:'⭐', glow:'#ffe566', label:'+5 Bonus!', timed:false, secs:0},
  {type:'shield',emoji:'🛡️', glow:'#63e6be', label:'Shield!',  timed:false, secs:0},
  {type:'bomb',  emoji:'💣', glow:'#ff8787', label:'Boom! -2',  timed:false, secs:0, bad:true},
];
const PU_LIFETIME_MIN=6000, PU_LIFETIME_MAX=10000;
const PU_BLINK_BELOW=2500; // ms remaining when blink starts
const SPAWN_STEPS_MIN=22, SPAWN_STEPS_MAX=40;

function setSnakeSpeed(btn){
  document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  snakeBaseSpeed=parseInt(btn.dataset.spd);
  if(G.started&&!G.over) resetSnakeLoop();
}

function effectiveSpeed(){
  let s=snakeBaseSpeed;
  if(G.eff.fast) s=Math.max(45, Math.round(s*0.45));
  if(G.eff.slow) s=Math.min(480, Math.round(s*2.2));
  return s;
}

function resetSnakeLoop(){
  stopLoop();
  if(G.started&&!G.over) gameLoop=setInterval(snakeStep,effectiveSpeed());
}

function initSnake(){
  cvs.width=SN_W; cvs.height=SN_H; cvs.style.cursor='default';
  cvs.onclick=snakeStart;
  G={
    snake:[{r:10,c:10},{r:10,c:9},{r:10,c:8}],
    dir:{dc:1,dr:0}, next:{dc:1,dr:0},
    food:null, score:0, over:false, started:false,
    items:[],           // [{type,r,c,timer,maxTimer}]
    eff:{},             // active timed effects: {fast:msLeft, slow:msLeft}
    shield:false,       // one-use wall pass
    spawnIn:SPAWN_STEPS_MIN, stepCount:0,
    feedback:null,      // {txt, till(ms)}
    spawnNotice:null,   // {txt, till(ms)}
  };
  G.food=snakeNewFood();
  updateScore(0); updatePill(t('ready'));
  renderSnake();
}

function snakeStart(){
  if(G.started||G.over) return;
  G.started=true; cvs.onclick=null;
  updatePill(t('playing'),'pulse');
  gameLoop=setInterval(snakeStep,effectiveSpeed());
}

function snakeNewFood(){
  const occ=snakeOccupied();
  let r,c;
  do{r=Math.floor(Math.random()*SN_ROWS);c=Math.floor(Math.random()*SN_COLS);}
  while(occ.has(r*SN_COLS+c));
  return{r,c};
}

function snakeOccupied(){
  const s=new Set(G.snake.map(s=>s.r*SN_COLS+s.c));
  if(G.food) s.add(G.food.r*SN_COLS+G.food.c);
  (G.items||[]).forEach(it=>s.add(it.r*SN_COLS+it.c));
  return s;
}

function onSnakeKey(e){
  const map={ArrowUp:{dr:-1,dc:0},ArrowDown:{dr:1,dc:0},ArrowLeft:{dr:0,dc:-1},ArrowRight:{dr:0,dc:1},
    w:{dr:-1,dc:0},s:{dr:1,dc:0},a:{dr:0,dc:-1},d:{dr:0,dc:1},
    W:{dr:-1,dc:0},S:{dr:1,dc:0},A:{dr:0,dc:-1},D:{dr:0,dc:1}};
  const d=map[e.key];
  if(!d) return;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  if(!G.started&&!G.over) snakeStart();
  if(d.dr===-G.dir.dr&&d.dc===-G.dir.dc) return;
  G.next=d;
}
function snakeDir(dc,dr){
  if(!G.started&&!G.over) snakeStart();
  if(dr===-G.dir.dr&&dc===-G.dir.dc) return;
  G.next={dr,dc};
}

function snakeStep(){
  const stepMs=effectiveSpeed();

  // ── tick timed effects ──
  let speedChanged=false;
  for(const k of Object.keys(G.eff)){
    G.eff[k]-=stepMs;
    if(G.eff[k]<=0){delete G.eff[k];speedChanged=true;}
  }
  if(speedChanged) resetSnakeLoop();

  // ── tick item lifetimes ──
  G.items=G.items.filter(it=>{it.timer-=stepMs;return it.timer>0;});

  // ── move head ──
  G.dir=G.next;
  const head=G.snake[0];
  let nr=head.r+G.dir.dr, nc=head.c+G.dir.dc;

  // wall collision → shield wraps once
  if(nr<0||nr>=SN_ROWS||nc<0||nc>=SN_COLS){
    if(G.shield){
      G.shield=false;
      nr=((nr%SN_ROWS)+SN_ROWS)%SN_ROWS;
      nc=((nc%SN_COLS)+SN_COLS)%SN_COLS;
      snakeFeedback('🛡️ Wall pass!');
    } else {
      return snakeDie();
    }
  }
  // self collision
  if(G.snake.some(s=>s.r===nr&&s.c===nc)) return snakeDie();

  G.snake.unshift({r:nr,c:nc});

  // ── eat food ──
  if(nr===G.food.r&&nc===G.food.c){
    G.score++;
    updateScore(G.score);
    G.food=snakeNewFood();
    if(G.score%5===0){snakeBaseSpeed=Math.max(60,snakeBaseSpeed-12);resetSnakeLoop();}
  } else {
    G.snake.pop();
  }

  // ── eat power-up ──
  const hitIdx=G.items.findIndex(it=>it.r===nr&&it.c===nc);
  if(hitIdx>=0){
    const it=G.items.splice(hitIdx,1)[0];
    applyPowerup(it.type);
  }

  // ── spawn new item (AFTER move+eat so position is current) ──
  G.stepCount++;
  if(G.stepCount>=G.spawnIn){
    G.stepCount=0;
    G.spawnIn=SPAWN_STEPS_MIN+Math.floor(Math.random()*(SPAWN_STEPS_MAX-SPAWN_STEPS_MIN));
    if(G.items.length<2) spawnPowerup();
  }

  renderSnake();
}

function snakeDie(){
  G.over=true; stopLoop();
  updatePill(t('gameOver'),'over');
  renderSnake();
  setTimeout(()=>showWin('😵',t('gameOver'),'lose',`${t('score')}: ${G.score}`),400);
}

function spawnPowerup(){
  const occ=snakeOccupied();
  const empty=[];
  for(let r=2;r<SN_ROWS-2;r++) for(let c=2;c<SN_COLS-2;c++) if(!occ.has(r*SN_COLS+c)) empty.push([r,c]);
  if(!empty.length) return;
  const [r,c]=empty[Math.floor(Math.random()*empty.length)];
  // weighted pool: bomb is rare (1/8)
  const pool=[...POWERUPS,...POWERUPS,...POWERUPS,POWERUPS[5]]; // bomb appears ~3/21
  // actually: pool of types weighted
  const weights=[3,3,3,3,3,1]; // fast/slow/short/star/shield : bomb = 15:1 → simpler:
  const typePool=[];
  POWERUPS.forEach((pu,i)=>{ for(let j=0;j<(pu.bad?1:3);j++) typePool.push(pu);});
  const pu=typePool[Math.floor(Math.random()*typePool.length)];
  const maxTimer=PU_LIFETIME_MIN+Math.floor(Math.random()*(PU_LIFETIME_MAX-PU_LIFETIME_MIN));
  G.items.push({type:pu.type,r,c,timer:maxTimer,maxTimer});
  // notify player a new item appeared on board
  const names={fast:'Speed Up',slow:'Slow Mo',short:'Snip',star:'+5 Star',shield:'Shield',bomb:'Bomb!'};
  snakeSpawnNotice(pu.emoji+' '+names[pu.type],!!pu.bad);
}

function snakeSpawnNotice(txt,bad){
  G.spawnNotice={txt,bad,till:Date.now()+2400};
}

function applyPowerup(type){
  const pu=POWERUPS.find(p=>p.type===type);
  switch(type){
    case 'fast':
      G.eff.fast=(pu.secs*1000); resetSnakeLoop();
      snakeFeedback('⚡ Speed Up!');break;
    case 'slow':
      G.eff.slow=(pu.secs*1000); resetSnakeLoop();
      snakeFeedback('🐢 Slow Mo!');break;
    case 'short':
      G.snake=G.snake.slice(0,Math.max(2,Math.floor(G.snake.length/2)));
      G.score+=2; updateScore(G.score);
      snakeFeedback('✂️ Snip! +2');break;
    case 'star':
      G.score+=5; updateScore(G.score);
      snakeFeedback('⭐ +5 Bonus!');break;
    case 'shield':
      G.shield=true;
      snakeFeedback('🛡️ Shield ready!');break;
    case 'bomb':
      G.snake=G.snake.slice(0,Math.max(2,G.snake.length-3));
      G.score=Math.max(0,G.score-2); updateScore(G.score);
      snakeFeedback('💣 Boom! -2');break;
  }
}

function snakeFeedback(txt){
  G.feedback={txt, till:Date.now()+1800};
}

const FOOD_EMOJIS=['🍎','🍊','🍋','🍇','🍓','🍉'];
const EMOJI_FONT=`"Segoe UI Emoji","Apple Color Emoji","Noto Color Emoji",serif`;
function renderSnake(){
  ctx.fillStyle='#1a3a1a'; ctx.fillRect(0,0,SN_W,SN_H);

  // grid dots
  ctx.fillStyle='rgba(255,255,255,0.06)';
  for(let r=0;r<SN_ROWS;r++) for(let c=0;c<SN_COLS;c++){
    ctx.fillRect(c*SN_CELL+SN_CELL/2-1,r*SN_CELL+SN_CELL/2-1,2,2);
  }

  // ── food ──
  const fi=G.score%FOOD_EMOJIS.length;
  const fx=G.food.c*SN_CELL+SN_CELL/2, fy=G.food.r*SN_CELL+SN_CELL/2;
  ctx.fillStyle='rgba(255,230,80,0.3)';
  ctx.beginPath();ctx.arc(fx,fy,SN_CELL*.46,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.95)';
  ctx.font=`${SN_CELL+2}px ${EMOJI_FONT}`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(FOOD_EMOJIS[fi],fx,fy+1);

  // ── power-up items ──
  const now=Date.now();
  G.items.forEach(it=>{
    const pct=it.timer/it.maxTimer;
    const blinking=it.timer<PU_BLINK_BELOW;
    // blink rate: 400ms cycle when first blinking, 200ms when nearly gone
    const blinkRate=it.timer<1200?200:400;
    if(blinking&&(now%blinkRate)<blinkRate*.45) return; // skip = invisible frame
    const pu=POWERUPS.find(p=>p.type===it.type);
    const ix=it.c*SN_CELL+SN_CELL/2, iy=it.r*SN_CELL+SN_CELL/2;
    // glow bg
    const alpha=blinking?0.45:0.7;
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.fillStyle=pu.glow;
    ctx.beginPath();ctx.arc(ix,iy,SN_CELL*.46,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    ctx.restore();
    // emoji
    ctx.fillStyle='rgba(255,255,255,0.95)';
    ctx.font=`${SN_CELL+2}px ${EMOJI_FONT}`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(pu.emoji,ix,iy+1);
    // timer ring
    ctx.strokeStyle=pu.glow; ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(ix,iy,SN_CELL*.46,-Math.PI/2,-Math.PI/2+Math.PI*2*pct);ctx.stroke();
  });

  // ── snake body ──
  const hasShield=G.shield;
  G.snake.forEach((seg,i)=>{
    const x=seg.c*SN_CELL, y=seg.r*SN_CELL;
    if(i===0){
      // head colour changes with active effects
      let headColor='#4ecc6a';
      if(G.eff.fast) headColor='#ffd43b';
      else if(G.eff.slow) headColor='#74c0fc';
      ctx.fillStyle=headColor;
      roundRect(ctx,x+1,y+1,SN_CELL-2,SN_CELL-2,5); ctx.fill();
      if(hasShield){
        ctx.strokeStyle='#63e6be'; ctx.lineWidth=2;
        roundRect(ctx,x+1,y+1,SN_CELL-2,SN_CELL-2,5); ctx.stroke();
      }
      const ex=x+SN_CELL*.28, ex2=x+SN_CELL*.72, ey=y+SN_CELL*.38, er=SN_CELL*.1;
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(ex,ey,er,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(ex2,ey,er,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#111';
      ctx.beginPath();ctx.arc(ex+er*.2,ey+er*.2,er*.55,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(ex2+er*.2,ey+er*.2,er*.55,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#1a5a2a'; ctx.lineWidth=1.5; ctx.lineCap='round';
      ctx.beginPath();ctx.arc(x+SN_CELL/2,y+SN_CELL*.62,SN_CELL*.15,0,Math.PI);ctx.stroke();
    } else {
      const t2=i/G.snake.length;
      let hue=130-t2*20;
      if(G.eff.fast) hue=45;
      else if(G.eff.slow) hue=210;
      ctx.fillStyle=`hsl(${hue},${70-t2*20}%,${40+t2*10}%)`;
      roundRect(ctx,x+2,y+2,SN_CELL-4,SN_CELL-4,4); ctx.fill();
    }
  });

  // ── active effects HUD (top-left) ──
  let hudX=4;
  Object.entries(G.eff).forEach(([k,ms])=>{
    const pu=POWERUPS.find(p=>p.type===k);
    const pct=ms/(pu.secs*1000);
    ctx.fillStyle='rgba(0,0,0,0.4)';
    roundRect(ctx,hudX,4,30,34,6); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.font=`18px ${EMOJI_FONT}`;
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText(pu.emoji,hudX+15,6);
    // bar
    ctx.fillStyle='#333'; ctx.fillRect(hudX+2,28,26,4);
    ctx.fillStyle=pct>0.5?'#4ecc6a':'#ffa94d';
    ctx.fillRect(hudX+2,28,26*pct,4);
    hudX+=34;
  });
  if(G.shield){
    ctx.fillStyle='rgba(0,0,0,0.4)';
    roundRect(ctx,hudX,4,30,34,6); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.font=`18px ${EMOJI_FONT}`;
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText('🛡️',hudX+15,6);
    hudX+=34;
  }

  // ── collected item feedback (top-centre, bright white, fades) ──
  if(G.feedback&&G.feedback.till>now){
    const alpha=Math.min(1,(G.feedback.till-now)/400);
    ctx.save();
    ctx.globalAlpha=alpha;
    // pill background
    ctx.fillStyle='rgba(255,255,255,0.22)';
    const fw=ctx.measureText(G.feedback.txt).width+24;
    roundRect(ctx,SN_W/2-fw/2,SN_H*.14-14,fw,28,14);ctx.fill();
    ctx.fillStyle='#fff';
    ctx.font='bold 17px Nunito,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(G.feedback.txt,SN_W/2,SN_H*.14);
    ctx.restore();
  }

  // ── spawn notice (bottom strip, amber — "item appeared on board") ──
  if(G.spawnNotice&&G.spawnNotice.till>now){
    const left=G.spawnNotice.till-now;
    const alpha=Math.min(1,left/350)*0.93;
    ctx.save();
    ctx.globalAlpha=alpha;
    // amber strip for good items, red-tinted for bomb
    ctx.fillStyle=G.spawnNotice.bad?'rgba(120,20,20,0.82)':'rgba(120,80,0,0.82)';
    ctx.fillRect(0,SN_H-30,SN_W,30);
    // label: "On board →"
    ctx.fillStyle=G.spawnNotice.bad?'#ffaaaa':'#ffe066';
    ctx.font='bold 11px Nunito,sans-serif';
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText('ON BOARD →',6,SN_H-15);
    // item text
    ctx.fillStyle='#fff';
    ctx.font='bold 14px Nunito,sans-serif';
    ctx.textAlign='center';
    ctx.fillText(G.spawnNotice.txt,SN_W/2+18,SN_H-15);
    ctx.restore();
  }

  // ── start hint ──
  if(!G.started&&!G.over){
    ctx.fillStyle='rgba(0,0,0,0.52)';
    ctx.fillRect(0,SN_H/2-30,SN_W,60);
    ctx.fillStyle='#fff'; ctx.font='bold 15px Nunito,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(lang==='en'?'Press arrow key or tap to start':'按方向键或点击开始',SN_W/2,SN_H/2);
  }
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

// ═══════════════════════════════════════════════════════════════════════════════
// MATCH-3  (animated + power-up gems: row/col/cross/rainbow bombs)
// ═══════════════════════════════════════════════════════════════════════════════
const M3_ROWS=8, M3_COLS=8;
let M3_CELL, m3AF=null, m3ComboIv=null;
const M3_GEMS=['🍎','🍊','🍋','🍇','🫐','🍓'];
const M3_COLORS=['#ff6b6b','#ffa94d','#ffd43b','#cc5de8','#4dabf7','#f783ac'];
// special gem types: 'row' | 'col' | 'cross' | 'rainbow'
// G.specials = Map<r*M3_COLS+c, {type, color}>

function m3EaseOut(t){return 1-(1-t)*(1-t)*(1-t);}
function m3EaseBack(t){return 1+2.7*Math.pow(t-1,3)+1.7*Math.pow(t-1,2);}

function m3StopRaf(){if(m3AF){cancelAnimationFrame(m3AF);m3AF=null;}}
function m3Tick(){
  const now=Date.now(); renderMatch3(now);
  if(G.anims&&G.anims.some(a=>now<a.startT+a.dur)){
    m3AF=requestAnimationFrame(m3Tick);
  } else {
    m3AF=null; G.anims=[];
    if(G._m3done){const f=G._m3done;G._m3done=null;f();}
  }
}
function m3StartComboFade(){
  clearInterval(m3ComboIv);
  m3ComboIv=setInterval(()=>{
    const now=Date.now();
    renderMatch3(now);
    if(!G.m3Combo||now>=G.m3Combo.till){
      clearInterval(m3ComboIv); m3ComboIv=null;
      G.m3Combo=null; renderMatch3();
    }
  },15);
}
function m3Play(anims,done){m3StopRaf();G.anims=anims;G._m3done=done||null;m3AF=requestAnimationFrame(m3Tick);}

function initMatch3(){
  M3_CELL=Math.min(52,Math.floor(Math.min(window.innerWidth-32,440)/M3_COLS));
  cvs.width=M3_CELL*M3_COLS; cvs.height=M3_CELL*M3_ROWS; cvs.style.cursor='pointer';
  m3StopRaf();
  clearInterval(m3ComboIv); m3ComboIv=null;
  const maxMov=M3_MOVES[m3Difficulty]||25;
  G={board:null,sel:null,drag:null,score:0,animating:false,combo:0,anims:[],_m3done:null,
     m3Combo:null, specials:new Map(), lastSwap:null, moves:maxMov};
  do{G.board=Array.from({length:M3_ROWS},()=>Array.from({length:M3_COLS},()=>Math.floor(Math.random()*M3_GEMS.length)));
  }while(findM3Matches(G.board).length>0);
  cvs.onclick=null; cvs.style.touchAction='none';
  cvs.onpointerdown=m3PointerDown;
  cvs.onpointermove=m3PointerMove;
  cvs.onpointerup=cvs.onpointercancel=m3PointerUp;
  m3UpdateMoves();
  updateScore(0); updatePill(t('playing'));
  renderMatch3(Date.now());
}

function renderMatch3(now=Date.now()){
  const C=M3_CELL;
  ctx.fillStyle='#1a1a2e'; ctx.fillRect(0,0,cvs.width,cvs.height);
  const am=new Map();
  (G.anims||[]).forEach(a=>{const k=a.r*M3_COLS+a.c;am.set(k,(am.get(k)||[]).concat(a));});

  // ── drag-to-swap: determine hovered target cell ──
  let dragTarget=null;
  if(G.drag){const tc=Math.floor(G.drag.px/C),tr=Math.floor(G.drag.py/C);
    if(tr>=0&&tr<M3_ROWS&&tc>=0&&tc<M3_COLS&&Math.abs(tr-G.drag.r)+Math.abs(tc-G.drag.c)===1) dragTarget={r:tr,c:tc};}

  for(let r=0;r<M3_ROWS;r++) for(let c=0;c<M3_COLS;c++){
    const x=c*C,y=r*C,v=G.board[r][c];
    const isDragSrc=G.drag&&r===G.drag.r&&c===G.drag.c;
    const isDragTgt=dragTarget&&r===dragTarget.r&&c===dragTarget.c;
    const isSel=!G.drag&&G.sel&&G.sel.r===r&&G.sel.c===c;
    const sp=G.specials.get(r*M3_COLS+c)||null;
    ctx.fillStyle=isDragTgt?'rgba(100,200,255,0.35)':isSel?'rgba(255,255,255,0.28)':'rgba(255,255,255,0.07)';
    roundRect(ctx,x+2,y+2,C-4,C-4,7); ctx.fill();
    if(isDragSrc){m3DrawGem(x+C/2,y+C/2,C,v,1,0.22,false,sp);continue;}
    const aa=am.get(r*M3_COLS+c)||[];
    const swA=aa.find(a=>a.type==='swap');
    const drA=aa.find(a=>a.type==='drop');
    const poA=aa.find(a=>a.type==='pop');
    const spA=aa.find(a=>a.type==='spawn');
    if(v<0){
      if(poA){const tp=Math.min(1,(now-poA.startT)/poA.dur);m3DrawGem(x+C/2,y+C/2,C,poA.gem,1+tp*0.7,1-m3EaseOut(tp),false,poA.sp);}
      continue;
    }
    if(swA){
      const ts=Math.min(1,Math.max(0,(now-swA.startT)/swA.dur));
      const p=swA.rev?1-m3EaseOut(ts):m3EaseOut(ts);
      m3DrawGem(x+C/2+(swA.toC-c)*C*p,y+C/2+(swA.toR-r)*C*p,C,v,1,1,isSel,sp);
      continue;
    }
    let gx=x+C/2,gy=y+C/2,gs=isSel?1+0.07*Math.sin(now/120):1;
    if(drA){const td=Math.min(1,Math.max(0,(now-drA.startT)/drA.dur));gy=y+C/2-(1-m3EaseBack(td))*drA.fromRows*C;}
    if(spA){const ts=Math.min(1,Math.max(0,(now-spA.startT)/spA.dur));gs*=m3EaseBack(ts);}
    m3DrawGem(gx,gy,C,v,gs,1,isSel,sp);
  }

  // ── blast effects (drawn on top, not per-cell) ──
  (G.anims||[]).filter(a=>a.type==='blast').forEach(a=>{
    const t=Math.min(1,(now-a.startT)/a.dur);
    const alpha=Math.max(0,0.55*(1-t*t));
    if(alpha<0.01) return;
    const cx=a.c*C+C/2, cy=a.r*C+C/2;
    ctx.save(); ctx.globalAlpha=alpha;
    ctx.fillStyle=a.col||'rgba(255,240,120,0.9)';
    ctx.shadowColor=a.col||'#fff'; ctx.shadowBlur=18*(1-t);
    switch(a.btype){
      case 'row': ctx.fillRect(0,cy-C*.22,cvs.width,C*.44); break;
      case 'col': ctx.fillRect(cx-C*.22,0,C*.44,cvs.height); break;
      case 'cross':
        ctx.fillRect(0,cy-C*.22,cvs.width,C*.44);
        ctx.fillRect(cx-C*.22,0,C*.44,cvs.height); break;
      case 'rainbow':{
        const rad=C*(0.4+t*Math.sqrt(cvs.width*cvs.width+cvs.height*cvs.height)/C);
        const g=ctx.createRadialGradient(cx,cy,0,cx,cy,rad);
        ['#ff6b6b','#ffd43b','#4dabf7','#f783ac'].forEach((col,i,arr)=>g.addColorStop(i/(arr.length-1),col));
        ctx.strokeStyle=g; ctx.lineWidth=C*.18*(1-t);
        ctx.beginPath(); ctx.arc(cx,cy,Math.min(rad,Math.hypot(cvs.width,cvs.height)),0,Math.PI*2); ctx.stroke();
      } break;
    }
    ctx.restore();
  });

  // ── drag floating gem (drawn above board, below combo text) ──
  if(G.drag){
    const dg=G.drag,dv=G.board[dg.r][dg.c],dsp=G.specials.get(dg.r*M3_COLS+dg.c)||null;
    ctx.save(); ctx.fillStyle='rgba(0,0,0,0.18)';
    ctx.beginPath(); ctx.ellipse(dg.px+3,dg.py+8,C*.36,C*.2,0,0,Math.PI*2); ctx.fill(); ctx.restore();
    m3DrawGem(dg.px,dg.py,C,dv,1.15,1,false,dsp);
  }

  // ── combo flash ──
  if(G.m3Combo&&G.m3Combo.till>now){
    const frac=(G.m3Combo.till-now)/900,alpha=Math.min(1,frac*3),sc=1+0.4*(1-frac);
    ctx.save(); ctx.globalAlpha=alpha;
    ctx.font=`bold ${Math.round(C*sc)}px Nunito,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#ffd43b'; ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=10;
    ctx.fillText(G.m3Combo.txt,cvs.width/2,cvs.height/2);
    ctx.restore();
  }
}

function m3DrawGem(cx,cy,C,gem,scale,alpha,sel,special){
  if(alpha<0.02||scale<0.01) return;
  ctx.save(); ctx.globalAlpha=alpha; ctx.translate(cx,cy);
  if(scale!==1) ctx.scale(scale,scale);
  ctx.shadowColor='rgba(0,0,0,0.28)'; ctx.shadowBlur=6;
  // base circle: rainbow gradient for rainbow bomb, else normal color
  if(special?.type==='rainbow'){
    const g=ctx.createLinearGradient(-C*.35,-C*.35,C*.35,C*.35);
    g.addColorStop(0,'#ff6b6b'); g.addColorStop(0.33,'#ffd43b');
    g.addColorStop(0.66,'#4dabf7'); g.addColorStop(1,'#f783ac');
    ctx.fillStyle=g;
  } else { ctx.fillStyle=M3_COLORS[gem]; }
  ctx.beginPath(); ctx.arc(0,0,C*.35,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.38)';
  ctx.beginPath(); ctx.arc(-C*.12,-C*.12,C*.1,0,Math.PI*2); ctx.fill();
  if(special?.type==='rainbow'){
    // star icon + pulsing ring
    ctx.fillStyle='rgba(255,255,255,0.95)';
    ctx.font=`bold ${C*.44}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('★',0,C*.02);
    const pulse=0.88+0.12*Math.sin(Date.now()/180);
    const rg=ctx.createLinearGradient(-C*.4,0,C*.4,0);
    rg.addColorStop(0,'#ff6b6b'); rg.addColorStop(0.5,'#ffd43b'); rg.addColorStop(1,'#4dabf7');
    ctx.strokeStyle=rg; ctx.lineWidth=C*.075*pulse;
    ctx.beginPath(); ctx.arc(0,0,C*.39,0,Math.PI*2); ctx.stroke();
  } else {
    ctx.font=`${C*.38}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(M3_GEMS[gem],0,C*.01);
  }
  // ── special overlays ──
  if(special){
    ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineCap='round';
    switch(special.type){
      case 'row':
        ctx.lineWidth=C*.065;
        ctx.beginPath(); ctx.moveTo(-C*.33,-C*.1); ctx.lineTo(C*.33,-C*.1); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-C*.33,C*.1); ctx.lineTo(C*.33,C*.1); ctx.stroke();
        ctx.fillStyle='rgba(255,255,255,0.85)';
        ctx.beginPath(); ctx.moveTo(-C*.37,0); ctx.lineTo(-C*.29,-C*.11); ctx.lineTo(-C*.29,C*.11); ctx.fill();
        ctx.beginPath(); ctx.moveTo(C*.37,0); ctx.lineTo(C*.29,-C*.11); ctx.lineTo(C*.29,C*.11); ctx.fill();
        break;
      case 'col':
        ctx.lineWidth=C*.065;
        ctx.beginPath(); ctx.moveTo(-C*.1,-C*.33); ctx.lineTo(-C*.1,C*.33); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(C*.1,-C*.33); ctx.lineTo(C*.1,C*.33); ctx.stroke();
        ctx.fillStyle='rgba(255,255,255,0.85)';
        ctx.beginPath(); ctx.moveTo(0,-C*.37); ctx.lineTo(-C*.11,-C*.29); ctx.lineTo(C*.11,-C*.29); ctx.fill();
        ctx.beginPath(); ctx.moveTo(0,C*.37); ctx.lineTo(-C*.11,C*.29); ctx.lineTo(C*.11,C*.29); ctx.fill();
        break;
      case 'cross':
        ctx.lineWidth=C*.07;
        for(let i=0;i<4;i++){ctx.save();ctx.rotate(i*Math.PI/4);ctx.beginPath();ctx.moveTo(0,-C*.14);ctx.lineTo(0,-C*.37);ctx.stroke();ctx.restore();}
        ctx.fillStyle='rgba(255,255,255,0.92)';
        ctx.beginPath(); ctx.arc(0,0,C*.1,0,Math.PI*2); ctx.fill();
        break;
    }
  }
  if(sel){ctx.strokeStyle='rgba(255,255,255,0.9)';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(0,0,C*.39,0,Math.PI*2);ctx.stroke();}
  ctx.restore();
}

function m3Click(e){
  if(G.animating) return;
  const rect=cvs.getBoundingClientRect(),C=M3_CELL;
  const c=Math.floor((e.clientX-rect.left)/C),r=Math.floor((e.clientY-rect.top)/C);
  if(r<0||r>=M3_ROWS||c<0||c>=M3_COLS||G.board[r][c]<0) return;
  if(!G.sel){G.sel={r,c};renderMatch3();return;}
  const{r:sr,c:sc}=G.sel;
  if(sr===r&&sc===c){G.sel=null;renderMatch3();return;}
  if(Math.abs(r-sr)+Math.abs(c-sc)===1){G.sel=null;m3TrySwap(r,c,sr,sc);}
  else{G.sel={r,c};renderMatch3();}
}
function m3PointerDown(e){
  if(mode!=='match3'||G.animating||G.drag) return;
  const rect=cvs.getBoundingClientRect(),C=M3_CELL;
  const x=e.clientX-rect.left,y=e.clientY-rect.top;
  const c=Math.floor(x/C),r=Math.floor(y/C);
  if(r<0||r>=M3_ROWS||c<0||c>=M3_COLS||G.board[r][c]<0) return;
  e.preventDefault(); cvs.setPointerCapture(e.pointerId);
  G.drag={r,c,startX:x,startY:y,px:x,py:y,pid:e.pointerId};
  G.sel=null; renderMatch3();
}
function m3PointerMove(e){
  if(mode!=='match3'||!G.drag||G.drag.pid!==e.pointerId) return;
  const rect=cvs.getBoundingClientRect();
  G.drag.px=e.clientX-rect.left; G.drag.py=e.clientY-rect.top;
  renderMatch3();
}
function m3PointerUp(e){
  if(mode!=='match3'||!G.drag||G.drag.pid!==e.pointerId) return;
  const drag=G.drag,rect=cvs.getBoundingClientRect();
  const x=e.clientX-rect.left,y=e.clientY-rect.top;
  const C=M3_CELL,srcX=drag.c*C+C/2,srcY=drag.r*C+C/2;
  // short tap → keep click-to-select behaviour
  if(Math.hypot(x-drag.startX,y-drag.startY)<C*0.28){
    G.drag=null;
    if(G.sel){const{r:sr,c:sc}=G.sel;
      if(sr===drag.r&&sc===drag.c){G.sel=null;renderMatch3();return;}
      if(Math.abs(drag.r-sr)+Math.abs(drag.c-sc)===1){G.sel=null;m3TrySwap(drag.r,drag.c,sr,sc);return;}
    }
    G.sel={r:drag.r,c:drag.c}; renderMatch3(); return;
  }
  // dragged far enough — check if released on an adjacent cell
  const tc=Math.floor(x/C),tr=Math.floor(y/C);
  if(tr>=0&&tr<M3_ROWS&&tc>=0&&tc<M3_COLS&&Math.abs(tr-drag.r)+Math.abs(tc-drag.c)===1){
    G.drag=null; G.sel=null; m3TrySwap(drag.r,drag.c,tr,tc);
  } else {
    // released early / non-adjacent → animate gem back to source
    m3DragSnap(drag.px,drag.py,srcX,srcY);
  }
}
function m3DragSnap(fromX,fromY,toX,toY){
  const startT=Date.now(),dur=220;
  function tick(){
    const now=Date.now(),t=Math.min(1,(now-startT)/dur);
    const p=1-(1-t)*(1-t); // ease-out quad
    if(G.drag){G.drag.px=fromX+(toX-fromX)*p; G.drag.py=fromY+(toY-fromY)*p;}
    renderMatch3(now);
    if(t<1) requestAnimationFrame(tick); else {G.drag=null; G.sel=null; renderMatch3();}
  }
  requestAnimationFrame(tick);
}

function m3TrySwap(r1,c1,r2,c2){
  G.animating=true;
  const k1=r1*M3_COLS+c1, k2=r2*M3_COLS+c2;
  const hadSp1=G.specials.has(k1), hadSp2=G.specials.has(k2);
  // pre-check
  const tmp=G.board[r1][c1];G.board[r1][c1]=G.board[r2][c2];G.board[r2][c2]=tmp;
  const ok=findM3Matches(G.board).length>0 || hadSp1 || hadSp2;
  const tmp2=G.board[r1][c1];G.board[r1][c1]=G.board[r2][c2];G.board[r2][c2]=tmp2;
  const now=Date.now(),dur=165,half=Math.round(dur*.52);
  if(!ok){
    m3Play([{type:'swap',r:r1,c:c1,toR:r2,toC:c2,startT:now,dur:half},{type:'swap',r:r2,c:c2,toR:r1,toC:c1,startT:now,dur:half}],
      ()=>m3Play([{type:'swap',r:r1,c:c1,toR:r2,toC:c2,startT:Date.now(),dur:half,rev:true},{type:'swap',r:r2,c:c2,toR:r1,toC:c1,startT:Date.now(),dur:half,rev:true}],
        ()=>{G.animating=false;renderMatch3();}));
    return;
  }
  // decrement moves on valid swap
  G.moves=Math.max(0,(G.moves||1)-1);
  m3UpdateMoves();
  m3Play([{type:'swap',r:r1,c:c1,toR:r2,toC:c2,startT:now,dur},{type:'swap',r:r2,c:c2,toR:r1,toC:c1,startT:now,dur}],()=>{
    const t=G.board[r1][c1];G.board[r1][c1]=G.board[r2][c2];G.board[r2][c2]=t;
    // swap specials map entries
    const sp1=G.specials.get(k1),sp2=G.specials.get(k2);
    G.specials.delete(k1);G.specials.delete(k2);
    if(sp1)G.specials.set(k2,sp1); if(sp2)G.specials.set(k1,sp2);
    // force-activate any specials that were just swapped (even with no natural match)
    const extra=new Set();
    if(hadSp1)extra.add(k2); if(hadSp2)extra.add(k1);
    G.lastSwap={r1,c1,r2,c2}; G.combo=0;
    m3ProcessMatches(extra);
  });
}

function findM3Matches(board){
  // Simple set of matched keys — used for swap validation & stuck check
  const s=new Set();
  for(let r=0;r<M3_ROWS;r++) for(let c=0;c<M3_COLS-2;c++){
    const v=board[r][c];if(v<0)continue;
    if(board[r][c+1]===v&&board[r][c+2]===v){let l=3;while(c+l<M3_COLS&&board[r][c+l]===v)l++;for(let k=0;k<l;k++)s.add(r*M3_COLS+c+k);}
  }
  for(let c=0;c<M3_COLS;c++) for(let r=0;r<M3_ROWS-2;r++){
    const v=board[r][c];if(v<0)continue;
    if(board[r+1][c]===v&&board[r+2][c]===v){let l=3;while(r+l<M3_ROWS&&board[r+l][c]===v)l++;for(let k=0;k<l;k++)s.add((r+k)*M3_COLS+c);}
  }
  return[...s];
}

function findM3Runs(board){
  // Returns [{cells:[{r,c}], dir:'h'|'v', len, color}] for runs of 3+
  const runs=[];
  for(let r=0;r<M3_ROWS;r++){
    let c=0; while(c<M3_COLS){
      const v=board[r][c];if(v<0){c++;continue;}
      let l=1;while(c+l<M3_COLS&&board[r][c+l]===v)l++;
      if(l>=3)runs.push({cells:Array.from({length:l},(_,k)=>({r,c:c+k})),dir:'h',len:l,color:v});
      c+=l;
    }
  }
  for(let c=0;c<M3_COLS;c++){
    let r=0; while(r<M3_ROWS){
      const v=board[r][c];if(v<0){r++;continue;}
      let l=1;while(r+l<M3_ROWS&&board[r+l][c]===v)l++;
      if(l>=3)runs.push({cells:Array.from({length:l},(_,k)=>({r:r+k,c})),dir:'v',len:l,color:v});
      r+=l;
    }
  }
  return runs;
}

function m3ExpandSpecials(baseKeys){
  // Chain-activates any specials in baseKeys, returns {allKeys, blasts}
  const allKeys=new Set(baseKeys), blasts=[], visited=new Set();
  function activate(r,c,sp){
    if(visited.has(r*M3_COLS+c))return; visited.add(r*M3_COLS+c);
    blasts.push({r,c,btype:sp.type,col:M3_COLORS[sp.color]});
    switch(sp.type){
      case 'row': for(let cc=0;cc<M3_COLS;cc++)allKeys.add(r*M3_COLS+cc); break;
      case 'col': for(let rr=0;rr<M3_ROWS;rr++)allKeys.add(rr*M3_COLS+c); break;
      case 'cross':
        for(let cc=0;cc<M3_COLS;cc++)allKeys.add(r*M3_COLS+cc);
        for(let rr=0;rr<M3_ROWS;rr++)allKeys.add(rr*M3_COLS+c); break;
      case 'rainbow':
        for(let rr=0;rr<M3_ROWS;rr++)for(let cc=0;cc<M3_COLS;cc++)
          if(G.board[rr][cc]===sp.color)allKeys.add(rr*M3_COLS+cc); break;
    }
  }
  baseKeys.forEach(k=>{if(G.specials.has(k)){const sp=G.specials.get(k);activate(Math.floor(k/M3_COLS),k%M3_COLS,sp);}});
  // chain reactions
  let changed=true;
  while(changed){changed=false;allKeys.forEach(k=>{if(!visited.has(k)&&G.specials.has(k)){activate(Math.floor(k/M3_COLS),k%M3_COLS,G.specials.get(k));changed=true;}});}
  return{allKeys,blasts};
}

function m3DetermineNewSpecials(runs){
  // Determine new specials from run shapes; returns [{r,c,type,color}]
  const out=[], placed=new Set();
  const cellDirs=new Map(); // key → Set of dirs (for T/L detection)
  runs.forEach(run=>run.cells.forEach(({r,c})=>{const k=r*M3_COLS+c;if(!cellDirs.has(k))cellDirs.set(k,new Set());cellDirs.get(k).add(run.dir);}));
  const swCells=G.lastSwap?[{r:G.lastSwap.r1,c:G.lastSwap.c1},{r:G.lastSwap.r2,c:G.lastSwap.c2}]:[];
  function pickCell(cells){return cells.find(({r,c})=>swCells.some(s=>s.r===r&&s.c===c))||cells[Math.floor(cells.length/2)];}
  runs.forEach(run=>{
    let type=null,target=null;
    if(run.len>=5){type='rainbow';target=pickCell(run.cells);}
    else if(run.len===4){type=run.dir==='h'?'row':'col';target=pickCell(run.cells);}
    else if(run.len===3){
      const junc=run.cells.find(({r,c})=>cellDirs.get(r*M3_COLS+c)?.size>=2);
      if(junc){type='cross';target=junc;}
    }
    if(type&&target){
      const k=target.r*M3_COLS+target.c;
      if(!placed.has(k)){placed.add(k);out.push({r:target.r,c:target.c,type,color:run.color});}
    }
  });
  return out;
}

function m3ProcessMatches(extraKeys=new Set()){
  const runs=findM3Runs(G.board);
  const baseMatched=new Set(extraKeys);
  runs.forEach(run=>run.cells.forEach(({r,c})=>baseMatched.add(r*M3_COLS+c)));
  if(!baseMatched.size){
    G.animating=false;renderMatch3();
    if(G.moves<=0){
      const msg=(lang==='en'?'Score: ':'分数：')+G.score;
      setTimeout(()=>showWin('💎',t('gameOver'),'lose',msg),400);
    } else { checkM3Stuck(); }
    return;
  }
  G.combo++;
  const{allKeys,blasts}=m3ExpandSpecials(baseMatched);
  const newSpecials=m3DetermineNewSpecials(runs);
  const newSpKeys=new Set(newSpecials.map(s=>s.r*M3_COLS+s.c));
  const toClear=new Set([...allKeys].filter(k=>!newSpKeys.has(k)));
  G.score+=allKeys.size*(G.combo>1?G.combo*2:1);
  updateScore(G.score);
  if(G.combo>1){
    G.m3Combo={txt:`COMBO ×${G.combo}!`,till:Date.now()+900};
    m3StartComboFade();
  }
  // show special name
  if(newSpecials.length){
    const names={row:'→ Row Bomb!',col:'↕ Col Bomb!',cross:'✦ Cross Bomb!',rainbow:'★ Rainbow!'};
    updatePill(names[newSpecials[0].type]);
    setTimeout(()=>{if(!G.animating)updatePill(t('playing'));},1200);
  }
  const now=Date.now(),blastDelay=blasts.length?0:0;
  const anims=[];
  blasts.forEach(b=>anims.push({type:'blast',r:b.r,c:b.c,btype:b.btype,col:b.col,startT:now,dur:320}));
  [...toClear].forEach(k=>{
    const r2=Math.floor(k/M3_COLS),c2=k%M3_COLS;
    const sp=G.specials.get(k);
    anims.push({type:'pop',r:r2,c:c2,gem:G.board[r2][c2],sp:sp||null,startT:now+(blasts.length?180:0),dur:blasts.length?300:270});
  });
  toClear.forEach(k=>{G.board[Math.floor(k/M3_COLS)][k%M3_COLS]=-1;G.specials.delete(k);});
  newSpecials.forEach(({r,c,type,color})=>{G.board[r][c]=color;G.specials.set(r*M3_COLS+c,{type,color});});
  m3Play(anims,()=>{
    const dropAnims=[],t0=Date.now();
    for(let c=0;c<M3_COLS;c++){
      const origCol=G.board.map(r=>r[c]);
      const surviving=[];
      for(let r=0;r<M3_ROWS;r++) if(origCol[r]>=0) surviving.push({origR:r,v:origCol[r]});
      const newCount=M3_ROWS-surviving.length;
      for(let i=0;i<newCount;i++){
        G.board[i][c]=Math.floor(Math.random()*M3_GEMS.length);
        dropAnims.push({type:'drop',r:i,c,fromRows:i+1,startT:t0,dur:170+(i+1)*28});
      }
      surviving.forEach(({origR,v},i)=>{
        const newR=newCount+i;
        const spk=origR*M3_COLS+c;
        if(G.specials.has(spk)){const sp=G.specials.get(spk);G.specials.delete(spk);G.specials.set(newR*M3_COLS+c,sp);}
        G.board[newR][c]=v;
        const fell=newR-origR;
        if(fell>0)dropAnims.push({type:'drop',r:newR,c,fromRows:fell,startT:t0,dur:155+fell*40});
      });
    }
    // spawn-in animation for new specials (they're now in their gravity-settled positions)
    newSpecials.forEach(({r,c})=>{
      const spk=r*M3_COLS+c;
      if(G.specials.has(spk))dropAnims.push({type:'spawn',r,c,startT:t0+80,dur:380});
    });
    m3Play(dropAnims,()=>setTimeout(m3ProcessMatches,55));
  });
}

function checkM3Stuck(){
  if(G.specials.size>0)return; // specials can always be activated
  const dirs=[[0,1],[1,0]];
  for(let r=0;r<M3_ROWS;r++) for(let c=0;c<M3_COLS;c++) for(const[dr,dc]of dirs){
    const nr=r+dr,nc=c+dc;if(nr>=M3_ROWS||nc>=M3_COLS)continue;
    const b=G.board.map(row=>[...row]);
    const tmp=b[r][c];b[r][c]=b[nr][nc];b[nr][nc]=tmp;
    if(findM3Matches(b).length>0)return;
  }
  updatePill(lang==='en'?'Reshuffling…':'重新洗牌…');
  setTimeout(()=>{
    G.specials.clear();
    do{G.board=Array.from({length:M3_ROWS},()=>Array.from({length:M3_COLS},()=>Math.floor(Math.random()*M3_GEMS.length)));
    }while(findM3Matches(G.board).length>0);
    renderMatch3();updatePill(t('playing'));
  },600);
}

// ═══════════════════════════════════════════════════════════════════════════════
// LIANLIANKAN (连连看)
// ═══════════════════════════════════════════════════════════════════════════════
const LL_COLS=8, LL_ROWS=6;
const LL_EMOJIS=['🐱','🐶','🐸','🦊','🐼','🐨','🦁','🐯','🐙','🦋','🌸','⭐'];
let LL_CELL;

function initLian(){
  LL_CELL=Math.min(62, Math.floor((Math.min(window.innerWidth-32,520))/(LL_COLS+2)));
  const W=(LL_COLS+2)*LL_CELL, H=(LL_ROWS+2)*LL_CELL;
  cvs.width=W; cvs.height=H; cvs.style.cursor='pointer';
  // board: (LL_ROWS+2) x (LL_COLS+2), border=0, inner has pairs
  const totalCells=LL_ROWS*LL_COLS; // 48 cells = 24 pairs
  const pairs=totalCells/2;
  const emojis=[];
  for(let i=0;i<pairs;i++) emojis.push(i%LL_EMOJIS.length, i%LL_EMOJIS.length);
  shuffle(emojis);
  G={
    board:Array.from({length:LL_ROWS+2},()=>Array(LL_COLS+2).fill(0)),
    sel:null, score:0, remaining:totalCells, flash:null
  };
  let idx=0;
  for(let r=1;r<=LL_ROWS;r++) for(let c=1;c<=LL_COLS;c++) G.board[r][c]=emojis[idx++]+1;
  cvs.onclick=lianClick;
  updateScore(0); updatePill(t('playing'));
  renderLian();
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function renderLian(){
  const C=LL_CELL;
  const rows=LL_ROWS+2, cols=LL_COLS+2;
  ctx.fillStyle='#1a2a3a'; ctx.fillRect(0,0,cvs.width,cvs.height);
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const v=G.board[r][c];
    const x=c*C, y=r*C;
    if(r===0||r===rows-1||c===0||c===cols-1) continue; // border
    const isSel=G.sel&&G.sel[0]===r&&G.sel[1]===c;
    if(v===0){
      // empty cell
      ctx.fillStyle='rgba(255,255,255,0.04)';
      roundRect(ctx,x+3,y+3,C-6,C-6,6); ctx.fill();
      continue;
    }
    // tile
    ctx.fillStyle=isSel?'#ffe066':'rgba(255,255,255,0.9)';
    roundRect(ctx,x+3,y+3,C-6,C-6,8); ctx.fill();
    if(isSel){ctx.strokeStyle='#f4a94e';ctx.lineWidth=2.5;roundRect(ctx,x+3,y+3,C-6,C-6,8);ctx.stroke();}
    ctx.font=`${C*.5}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(LL_EMOJIS[(v-1)%LL_EMOJIS.length],x+C/2,y+C/2);
  }
  // draw flash path
  if(G.flash){
    ctx.strokeStyle='rgba(255,200,60,0.85)'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.beginPath();
    G.flash.forEach(([r2,c2],i)=>{
      const x=c2*C+C/2, y=r2*C+C/2;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.stroke();
  }
}

function lianClick(e){
  const rect=cvs.getBoundingClientRect();
  const C=LL_CELL;
  const c=Math.floor((e.clientX-rect.left)/C);
  const r=Math.floor((e.clientY-rect.top)/C);
  if(r<1||r>LL_ROWS||c<1||c>LL_COLS) return;
  if(G.board[r][c]===0) return;
  if(!G.sel){G.sel=[r,c];renderLian();return;}
  const [sr,sc]=G.sel;
  if(sr===r&&sc===c){G.sel=null;renderLian();return;}
  if(G.board[r][c]!==G.board[sr][sc]){G.sel=[r,c];renderLian();return;}
  const path=lianFindPath(sr,sc,r,c);
  if(path){
    G.flash=path;
    G.board[sr][sc]=0; G.board[r][c]=0;
    G.remaining-=2; G.sel=null;
    G.score+=10; updateScore(G.score);
    renderLian();
    setTimeout(()=>{
      G.flash=null;
      if(G.remaining===0){
        renderLian();
        setTimeout(()=>showWin('🎉',t('youWin'),'',`${t('score')}: ${G.score}`),200);
      } else {
        if(!lianHasMoves()) lianHint();
        renderLian();
      }
    },400);
  } else {
    G.sel=[r,c]; renderLian();
  }
}

// BFS with turn count ≤ 2
function lianFindPath(r1,c1,r2,c2){
  const rows=LL_ROWS+2, cols=LL_COLS+2;
  // State: (r, c, lastDir, turns)
  // lastDir: -1=none, 0=up, 1=down, 2=left, 3=right
  const dirs=[[-1,0],[1,0],[0,-1],[0,1]];
  const key=(r,c,d,t)=>`${r},${c},${d},${t}`;
  const visited=new Set();
  // BFS queue: {r,c,dir,turns,path}
  const queue=[{r:r1,c:c1,dir:-1,turns:0,path:[[r1,c1]]}];
  while(queue.length){
    const {r,c,dir,turns,path}=queue.shift();
    for(let d=0;d<4;d++){
      const nr=r+dirs[d][0], nc=c+dirs[d][1];
      if(nr<0||nr>=rows||nc<0||nc>=cols) continue;
      const newTurns=turns+(dir!==-1&&d!==dir?1:0);
      if(newTurns>2) continue;
      const k=key(nr,nc,d,newTurns);
      if(visited.has(k)) continue;
      visited.add(k);
      const newPath=[...path,[nr,nc]];
      if(nr===r2&&nc===c2) return newPath;
      // can only traverse empty cells (except dest)
      if(G.board[nr][nc]!==0) continue;
      queue.push({r:nr,c:nc,dir:d,turns:newTurns,path:newPath});
    }
  }
  return null;
}

function lianHasMoves(){
  for(let r1=1;r1<=LL_ROWS;r1++) for(let c1=1;c1<=LL_COLS;c1++){
    if(!G.board[r1][c1]) continue;
    for(let r2=1;r2<=LL_ROWS;r2++) for(let c2=1;c2<=LL_COLS;c2++){
      if(r1===r2&&c1===c2) continue;
      if(G.board[r1][c1]!==G.board[r2][c2]) continue;
      if(lianFindPath(r1,c1,r2,c2)) return true;
    }
  }
  return false;
}

function lianHint(){
  // Shuffle inner tiles
  updatePill(lang==='en'?'Shuffling…':'重排中…');
  const tiles=[];
  for(let r=1;r<=LL_ROWS;r++) for(let c=1;c<=LL_COLS;c++) if(G.board[r][c]) tiles.push(G.board[r][c]);
  shuffle(tiles);
  let idx=0;
  for(let r=1;r<=LL_ROWS;r++) for(let c=1;c<=LL_COLS;c++) if(G.board[r][c]) G.board[r][c]=tiles[idx++];
  setTimeout(()=>updatePill(t('playing')),600);
}

// ═══════════════════════════════════════════════════════════════════════════════
// WHACK-A-MOLE
// ═══════════════════════════════════════════════════════════════════════════════
const WM_COLS=3, WM_ROWS=3;
let WM_CELL;
const WM_MOLE_EMOJIS=['🐹','🐭','🐰','🦔'];

function initMole(){
  WM_CELL=Math.min(130, Math.floor((Math.min(window.innerWidth-32,420))/WM_COLS));
  const W=WM_CELL*WM_COLS, H=WM_CELL*WM_ROWS;
  cvs.width=W; cvs.height=H; cvs.style.cursor='pointer';
  G={
    moles:Array.from({length:WM_ROWS},()=>Array(WM_COLS).fill(0)), // 0=hidden,1=up,2=hit
    score:0, timeLeft:30, over:false, speed:1400,
    moleTimers:[], // per-hole countdown
  };
  cvs.onclick=moleClick;
  updateScore(0);
  updatePill('30s ⏱️');
  renderMole();
  // start countdown
  const timerTick=setInterval(()=>{
    G.timeLeft--;
    updatePill(G.timeLeft+'s ⏱️');
    if(G.timeLeft<=0){
      clearInterval(timerTick); stopLoop();
      G.moleTimers.forEach(t=>clearTimeout(t));
      G.over=true; cvs.style.cursor='default';
      renderMole();
      setTimeout(()=>showWin('🐹',t('gameOver'),'',`${t('score')}: ${G.score}`),300);
    }
    // increase speed over time
    if(G.timeLeft===20) G.speed=1100;
    if(G.timeLeft===10) G.speed=800;
  },1000);
  G.moleTimers.push(timerTick);
  // start popping moles
  gameLoop=setInterval(molePopRandom,600);
}

function molePopRandom(){
  if(G.over) return;
  // find a hidden hole
  const hidden=[];
  for(let r=0;r<WM_ROWS;r++) for(let c=0;c<WM_COLS;c++) if(G.board&&G.moles[r][c]===0) hidden.push([r,c]);
  // actually just pick a random hole ignoring state if all occupied
  const r=Math.floor(Math.random()*WM_ROWS), c=Math.floor(Math.random()*WM_COLS);
  if(G.moles[r][c]!==0) return;
  G.moles[r][c]=1;
  renderMole();
  const t=setTimeout(()=>{
    if(G.moles[r][c]===1){G.moles[r][c]=0;renderMole();}
  }, G.speed);
  G.moleTimers.push(t);
}

function moleClick(e){
  if(G.over) return;
  const rect=cvs.getBoundingClientRect();
  const C=WM_CELL;
  const c=Math.floor((e.clientX-rect.left)/C);
  const r=Math.floor((e.clientY-rect.top)/C);
  if(r<0||r>=WM_ROWS||c<0||c>=WM_COLS) return;
  if(G.moles[r][c]===1){
    G.moles[r][c]=2; // hit
    G.score++; updateScore(G.score);
    renderMole();
    setTimeout(()=>{if(G.moles[r][c]===2){G.moles[r][c]=0;renderMole();}},250);
  }
}

function renderMole(){
  const C=WM_CELL;
  // background
  ctx.fillStyle='#3a7a2a'; ctx.fillRect(0,0,cvs.width,cvs.height);
  // grass pattern
  ctx.fillStyle='#4a9a3a';
  for(let r=0;r<WM_ROWS;r++) for(let c=0;c<WM_COLS;c++){
    if((r+c)%2===0){ctx.fillRect(c*C,r*C,C,C);}
  }
  // holes & moles
  for(let r=0;r<WM_ROWS;r++) for(let c=0;c<WM_COLS;c++){
    const x=c*C+C/2, y=r*C+C/2;
    const state=G.moles[r][c];
    // hole (dark oval)
    ctx.fillStyle='#1a3a10';
    ctx.beginPath();ctx.ellipse(x,y+C*.1,C*.38,C*.18,0,0,Math.PI*2);ctx.fill();
    if(state>0){
      // mole body
      const hitColor=state===2?'#ff6060':'#c07040';
      ctx.fillStyle=hitColor;
      ctx.beginPath();ctx.ellipse(x,y-C*.08,C*.3,C*.36,0,0,Math.PI*2);ctx.fill();
      // mole face emoji
      ctx.font=`${C*.52}px serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      const emoji=state===2?'😵':WM_MOLE_EMOJIS[Math.floor(G.score/3)%WM_MOLE_EMOJIS.length];
      ctx.fillText(emoji,x,y-C*.1);
      // stars on hit
      if(state===2){
        ctx.font=`${C*.22}px serif`;
        ctx.fillText('⭐',x-C*.38,y-C*.45);
        ctx.fillText('✨',x+C*.3,y-C*.5);
      }
    }
  }
  if(G.over){
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,cvs.width,cvs.height);
    ctx.fillStyle='#fff';ctx.font=`bold ${C*.28}px Nunito,sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(t('gameOver'),cvs.width/2,cvs.height/2);
  }
}

// ── Startup ───────────────────────────────────────────────────────────────────
setupMode();
newGame();
applyLang();
</script>
