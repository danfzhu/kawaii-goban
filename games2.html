<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bean Arcade рҹ•№пёҸ</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#5a9e6a;
  background-image:radial-gradient(circle,rgba(255,255,255,0.13) 1.5px,transparent 1.5px);
  background-size:22px 22px;
  font-family:'Nunito','PingFang SC','Microsoft YaHei',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:12px 8px 28px;gap:9px;user-select:none;
}
.mode-bar{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;background:rgba(255,255,255,0.38);padding:5px;border-radius:30px;box-shadow:0 3px 14px rgba(0,0,0,0.13)}
.mode-btn{padding:8px 18px;border-radius:24px;border:none;background:transparent;cursor:pointer;font-size:14px;font-weight:800;font-family:inherit;color:#1a4a2a;transition:all .2s;white-space:nowrap}
.mode-btn:hover{background:rgba(255,255,255,0.5)}
.mode-btn.active{background:linear-gradient(135deg,#1a4a2a,#2e7a44);color:#fff;box-shadow:0 2px 10px rgba(20,70,30,.35)}
.header{display:flex;align-items:center;gap:12px}
.header-group{display:flex;flex-direction:column;align-items:flex-start}
.title{font-size:22px;font-weight:900;background:linear-gradient(135deg,#1a4a2a,#2e7a44);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.title-sub{font-size:11px;color:rgba(20,70,30,.55);font-weight:600;margin-top:-1px}
.header-btns{display:flex;gap:7px;align-items:center}
.header-btn{padding:5px 13px;border-radius:20px;border:2px solid rgba(255,255,255,0.7);background:rgba(255,255,255,0.55);cursor:pointer;font-size:13px;color:#1a4a2a;font-weight:700;font-family:inherit;box-shadow:0 2px 6px rgba(0,0,0,0.1);transition:all .15s}
.header-btn:hover{background:rgba(255,255,255,0.8);transform:translateY(-1px)}
.nav-link{font-size:12px;color:rgba(255,255,255,0.85);font-weight:700;text-decoration:none;padding:4px 12px;border-radius:14px;background:rgba(255,255,255,0.2);transition:all .15s}
.nav-link:hover{background:rgba(255,255,255,0.35)}
.score-bar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:center;background:rgba(255,255,255,0.92);padding:10px 22px;border-radius:36px;box-shadow:0 3px 14px rgba(0,0,0,0.13)}
.score-item{display:flex;align-items:center;gap:8px}
.score-lbl{color:#4a8a5a;font-size:13px;font-weight:700}
.score-val{font-size:26px;font-weight:900;color:#1a4a2a;min-width:36px;text-align:center;line-height:1}
.turn-pill{padding:5px 14px;border-radius:20px;border:2.5px solid #a0d0a8;background:#f0fff4;font-size:13px;color:#1a5a2a;font-weight:700;white-space:nowrap;transition:all .2s}
.turn-pill.over{border-color:#e04040;background:#fff0f0;color:#c03030}
.turn-pill.pulse{animation:pulse .7s ease-in-out infinite alternate}
@keyframes pulse{from{opacity:.7}to{opacity:1}}
.board-wrap{border-radius:18px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.3),0 2px 6px rgba(0,0,0,0.12);border:3px solid rgba(255,255,255,0.28)}
#cvs{display:block;cursor:pointer}
.controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center}
.ctrl-row{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
.ctrl-btn{padding:8px 17px;border-radius:22px;border:2px solid rgba(255,255,255,0.7);background:rgba(255,255,255,0.75);cursor:pointer;font-size:13px;color:#1a4a2a;font-weight:700;font-family:inherit;box-shadow:0 2px 6px rgba(0,0,0,0.09);transition:all .15s}
.ctrl-btn:hover:not(:disabled){background:rgba(255,255,255,0.95);transform:translateY(-1px)}
.ctrl-btn:disabled{opacity:.35;cursor:not-allowed}
.ctrl-btn.primary{background:linear-gradient(135deg,#1a4a2a,#2e7a44);color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(20,70,30,.35)}
.ctrl-btn.primary:hover{background:linear-gradient(135deg,#2a6a3a,#3e9a54);transform:translateY(-1px)}
/* Snake direction pad */
.dpad{display:grid;grid-template-columns:repeat(3,44px);grid-template-rows:repeat(2,44px);gap:4px}
.dpad-btn{width:44px;height:44px;border-radius:12px;border:2px solid rgba(255,255,255,0.7);background:rgba(255,255,255,0.75);cursor:pointer;font-size:20px;font-family:inherit;color:#1a4a2a;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,0.1);transition:all .12s}
.dpad-btn:active{transform:scale(.92);background:rgba(255,255,255,0.95)}
.dpad-btn.hidden{visibility:hidden}
/* overlay */
.overlay{position:fixed;inset:0;background:rgba(20,70,30,.28);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(3px)}
.overlay.hidden{display:none}
.modal{background:#fff;border-radius:28px;padding:32px 38px;text-align:center;box-shadow:0 12px 56px rgba(0,0,0,.28);min-width:280px}
.modal-emoji{font-size:54px;margin-bottom:8px;animation:bounce .5s ease infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-8px)}}
.modal-title{font-size:24px;font-weight:900;color:#2a8a40;margin-bottom:6px}
.modal-title.lose{color:#c03030}
.modal-sub{font-size:14px;color:#8aaa70;font-weight:700;margin-bottom:22px}
.modal-btns{display:flex;gap:10px;justify-content:center}
.modal-btn{padding:10px 22px;border-radius:22px;border:2px solid #c0dcc0;background:#fff;cursor:pointer;font-size:15px;font-family:inherit;font-weight:700;color:#1a4a2a;transition:all .15s}
.modal-btn:hover{background:#f0fff4;transform:translateY(-1px)}
.modal-btn.primary{background:linear-gradient(135deg,#1a4a2a,#2e7a44);color:#fff;border-color:transparent;box-shadow:0 3px 12px rgba(20,70,30,.3)}
.tip-overlay{position:fixed;inset:0;background:rgba(20,70,30,.25);display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(3px)}
.tip-overlay.hidden{display:none}
.tip-box{background:#fff;border-radius:22px;padding:24px 28px;max-width:320px;text-align:left;line-height:1.75;font-size:14px;color:#1a4a2a;font-family:inherit;font-weight:600;box-shadow:0 10px 44px rgba(0,0,0,.2)}
.tip-box h3{margin-bottom:10px;font-size:17px;color:#1a4a2a;font-weight:900}
.tip-close-btn{display:block;margin-top:14px;padding:10px;text-align:center;background:linear-gradient(135deg,#1a4a2a,#2e7a44);color:#fff;border-radius:16px;border:none;cursor:pointer;width:100%;font-size:14px;font-family:inherit;font-weight:700}
/* Power-up legend */
#puLegend{
  display:none;flex-wrap:wrap;gap:5px;justify-content:center;
  max-width:560px;
}
.pu-leg{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,0.78);
  padding:5px 10px;border-radius:14px;
  font-size:12px;font-weight:800;color:#1a4a2a;
  white-space:nowrap;box-shadow:0 1px 5px rgba(0,0,0,0.08);
}
.pu-leg.bad{background:rgba(255,100,100,0.22);color:#8a2020;}
.pu-leg-ico{font-size:16px;line-height:1;}
.pu-leg-desc{font-size:11px;font-weight:600;color:#4a7a5a;margin-top:1px;}
.pu-leg.bad .pu-leg-desc{color:#c04040;}
/* Speed selector */
.speed-bar{display:flex;gap:4px;background:rgba(255,255,255,0.35);padding:4px;border-radius:24px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.speed-btn{padding:5px 12px;border-radius:20px;border:none;background:transparent;cursor:pointer;font-size:12px;color:#1a4a2a;font-weight:800;font-family:inherit;transition:all .18s}
.speed-btn:hover{background:rgba(255,255,255,0.5)}
.speed-btn.active{background:#2e7a44;color:#fff;box-shadow:0 2px 8px rgba(30,100,50,.32)}
/* Side D-pad buttons */
.dpad-side{
  width:58px;height:58px;border-radius:50%;
  border:2.5px solid rgba(255,255,255,0.75);
  background:rgba(255,255,255,0.78);
  cursor:pointer;font-size:26px;
  color:#1a4a2a;font-weight:900;
  display:none;align-items:center;justify-content:center;
  box-shadow:0 3px 14px rgba(0,0,0,0.18);
  transition:all .1s;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.dpad-side:active{transform:scale(.87);background:rgba(255,255,255,0.97);box-shadow:0 1px 4px rgba(0,0,0,0.12)}
#boardRow{display:flex;align-items:center;gap:10px}
#dpadUpDown{display:flex;flex-direction:column;align-items:center;gap:6px}
</style>
</head>
<body>

<div class="mode-bar">
  <button class="mode-btn active" data-mode="snake">рҹҗҚ <span data-k="modeSnake">Snake</span></button>
  <button class="mode-btn" data-mode="match3">рҹ’Һ <span data-k="modeMatch3">Match 3</span></button>
  <button class="mode-btn" data-mode="lian">рҹҖ„ <span data-k="modeLian">Connect</span></button>
  <button class="mode-btn" data-mode="mole">рҹҗ№ <span data-k="modeMole">Whack-a-Mole</span></button>
</div>

<div class="header">
  <div class="header-group">
    <h1 class="title" id="mainTitle">Bean Arcade рҹ•№пёҸ</h1>
    <div class="title-sub" id="mainSub">Classic fun games!</div>
  </div>
  <div class="header-btns">
    <button class="header-btn" id="langBtn" onclick="toggleLang()">дёӯ</button>
    <button class="header-btn" onclick="showTip()">?</button>
    <a class="nav-link" href="kids.html">рҹҺ® Kids</a>
    <a class="nav-link" href="index.html">рҹҺҙ Board</a>
  </div>
</div>

<div class="score-bar" id="scoreBar">
  <div class="score-item"><div class="score-lbl" data-k="score">Score</div><div class="score-val" id="scoreVal">0</div></div>
  <div class="score-item"><div class="score-lbl" data-k="best">Best</div><div class="score-val" id="bestVal">0</div></div>
  <div class="turn-pill" id="turnPill">в–¶ Ready</div>
</div>

<!-- в–І Up button (snake only) -->
<button class="dpad-side" id="dpadUp" onclick="snakeDir(0,-1)">в–І</button>

<!-- Board row: в—Җ | canvas | в–¶ -->
<div id="boardRow">
  <button class="dpad-side" id="dpadLeft" onclick="snakeDir(-1,0)">в—Җ</button>
  <div class="board-wrap" id="boardWrap">
    <canvas id="cvs"></canvas>
  </div>
  <button class="dpad-side" id="dpadRight" onclick="snakeDir(1,0)">в–¶</button>
</div>

<!-- в–ј Down button (snake only) -->
<button class="dpad-side" id="dpadDown" onclick="snakeDir(0,1)">в–ј</button>

<!-- Power-up legend (snake only) -->
<div id="puLegend">
  <div class="pu-leg"><span class="pu-leg-ico">вҡЎ</span><div><div>Speed Up</div><div class="pu-leg-desc">4s faster</div></div></div>
  <div class="pu-leg"><span class="pu-leg-ico">рҹҗў</span><div><div>Slow Mo</div><div class="pu-leg-desc">5s slower</div></div></div>
  <div class="pu-leg"><span class="pu-leg-ico">вңӮпёҸ</span><div><div>Snip!</div><div class="pu-leg-desc">half length +2</div></div></div>
  <div class="pu-leg"><span class="pu-leg-ico">вӯҗ</span><div><div>Bonus</div><div class="pu-leg-desc">+5 pts</div></div></div>
  <div class="pu-leg"><span class="pu-leg-ico">рҹӣЎпёҸ</span><div><div>Shield</div><div class="pu-leg-desc">pass wall Г—1</div></div></div>
  <div class="pu-leg bad"><span class="pu-leg-ico">рҹ’Ј</span><div><div>Bomb!</div><div class="pu-leg-desc">avoid! вҲ’2 pts</div></div></div>
</div>

<div class="controls" id="controls">
  <div class="ctrl-row" id="snakeSpeed" style="display:none">
    <div class="speed-bar">
      <button class="speed-btn active" data-spd="180" onclick="setSnakeSpeed(this)">рҹҗў <span data-k="slow">Slow</span></button>
      <button class="speed-btn" data-spd="120" onclick="setSnakeSpeed(this)">рҹҗҮ <span data-k="fast">Fast</span></button>
      <button class="speed-btn" data-spd="70" onclick="setSnakeSpeed(this)">вҡЎ <span data-k="turbo">Turbo</span></button>
    </div>
  </div>
  <div class="ctrl-row">
    <button class="ctrl-btn primary" onclick="newGame()">вңЁ <span data-k="newGame">New Game</span></button>
  </div>
</div>

<div class="overlay hidden" id="winOverlay">
  <div class="modal">
    <div class="modal-emoji" id="winEmoji">рҹҺү</div>
    <div class="modal-title" id="winTitle">You Win!</div>
    <div class="modal-sub" id="winSub"></div>
    <div class="modal-btns">
      <button class="modal-btn primary" onclick="newGame();closeModal()">вңЁ <span data-k="again">Play Again</span></button>
    </div>
  </div>
</div>

<div class="tip-overlay hidden" id="tipOverlay">
  <div class="tip-box">
    <h3 id="tipTitle">How to Play</h3>
    <div id="tipBody"></div>
    <button class="tip-close-btn" onclick="closeTip()"><span data-k="tipClose">Got it!</span></button>
  </div>
</div>

<script>
'use strict';

// в”Җв”Җ Translations в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const TI={
  en:{
    modeSnake:'Snake', modeMatch3:'Match 3', modeLian:'Connect', modeMole:'Whack-a-Mole',
    score:'Score', best:'Best', newGame:'New Game', again:'Play Again', tipClose:'Got it!',
    slow:'Slow', fast:'Fast', turbo:'Turbo',
    ready:'в–¶ Ready', playing:'Playing!', gameOver:'Game Over', youWin:'You Win! рҹҺү',
    tipSnake:'<b>Snake:</b> Arrow keys / WASD / D-pad to steer. Eat рҹҚҺ to grow!<br><br>Power-ups appear and vanish (blink = almost gone!):<br>вҡЎ Speed Up &nbsp; рҹҗў Slow Mo &nbsp; вңӮпёҸ Snip (shorter)<br>вӯҗ +5 pts &nbsp; рҹӣЎпёҸ Shield (pass wall once) &nbsp; рҹ’Ј Bomb (avoid!)',
    tipMatch3:'<b>Match 3:</b> Click a gem, then click an adjacent gem to swap. Match 3 or more in a row/column to clear them! Score combos for bonus points.',
    tipLian:'<b>Connect:</b> Click two matching tiles that can be connected by a path with at most 2 turns (through empty space). Clear the board to win!',
    tipMole:'<b>Whack-a-Mole:</b> Click the moles before they hide! 30 seconds вҖ” score as high as you can. Speed increases over time!',
  },
  zh:{
    modeSnake:'иҙӘеҗғиӣҮ', modeMatch3:'дёүж¶Ҳ', modeLian:'иҝһиҝһзңӢ', modeMole:'жү“ең°йј ',
    score:'еҲҶж•°', best:'жңҖй«ҳеҲҶ', newGame:'ж–°жёёжҲҸ', again:'еҶҚжқҘдёҖеұҖ', tipClose:'еҘҪзҡ„пјҒ',
    slow:'ж…ўйҖҹ', fast:'еҝ«йҖҹ', turbo:'жһҒйҖҹ',
    ready:'в–¶ еҮҶеӨҮ', playing:'жёёжҲҸдёӯпјҒ', gameOver:'жёёжҲҸз»“жқҹ', youWin:'дҪ иөўдәҶпјҒрҹҺү',
    tipSnake:'<b>иҙӘеҗғиӣҮпјҡ</b>ж–№еҗ‘й”®/WASD/иҷҡжӢҹй”®жҺ§еҲ¶пјҢеҗғрҹҚҺй•ҝеӨ§пјҒ<br><br>йҒ“е…·дјҡеҮәзҺ°з„¶еҗҺж¶ҲеӨұпјҲй—ӘзғҒ=еҝ«жІЎдәҶпјүпјҡ<br>вҡЎеҠ йҖҹ &nbsp; рҹҗўеҮҸйҖҹ &nbsp; вңӮпёҸеҸҳзҹӯ &nbsp; вӯҗ+5еҲҶ &nbsp; рҹӣЎпёҸжҠӨзӣҫпјҲз©ҝеўҷдёҖж¬Ўпјү &nbsp; рҹ’ЈзӮёеј№пјҲиҰҒиәІејҖпјҒпјү',
    tipMatch3:'<b>дёүж¶Ҳпјҡ</b>зӮ№еҮ»дёҖйў—е®қзҹіпјҢеҶҚзӮ№еҮ»зӣёйӮ»е®қзҹіжқҘдәӨжҚўгҖӮиҝһжҲҗ3дёӘд»ҘдёҠзӣёеҗҢзҡ„еҚіеҸҜж¶ҲйҷӨпјҒ',
    tipLian:'<b>иҝһиҝһзңӢпјҡ</b>зӮ№еҮ»дёӨеј зӣёеҗҢзҡ„зүҢпјҢдёӯй—ҙиғҪд»ҘдёҚи¶…иҝҮ2ж¬ЎиҪ¬ејҜиҝһйҖҡе°ұж¶ҲйҷӨгҖӮжё…з©әжүҖжңүзүҢеҚіиғңпјҒ',
    tipMole:'<b>жү“ең°йј пјҡ</b>30з§’еҶ…зӮ№еҮ»й’»еҮәжқҘзҡ„ең°йј пјҒйҖҹеәҰи¶ҠжқҘи¶Ҡеҝ«пјҢзңӢиғҪеҫ—еӨҡе°‘еҲҶпјҒ',
  }
};
let lang='en';
const t=k=>TI[lang][k]||TI.en[k]||k;
function toggleLang(){lang=lang==='en'?'zh':'en';document.getElementById('langBtn').textContent=lang==='en'?'дёӯ':'EN';applyLang();}
function applyLang(){
  document.querySelectorAll('[data-k]').forEach(el=>el.textContent=t(el.getAttribute('data-k')));
  updatePill();
}

// в”Җв”Җ State в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let mode='snake';
let G={};
let gameLoop=null;
let bests={snake:0, match3:0, lian:0, mole:0};

const cvs=document.getElementById('cvs');
const ctx=cvs.getContext('2d');

// в”Җв”Җ Mode switching в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
document.querySelectorAll('.mode-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    mode=btn.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b===btn));
    stopLoop();
    setupMode();
    newGame();
  });
});

function stopLoop(){
  if(gameLoop){clearInterval(gameLoop);gameLoop=null;}
}

function setDpad(show){
  const flex='flex';
  ['dpadUp','dpadDown','dpadLeft','dpadRight'].forEach(id=>{
    document.getElementById(id).style.display=show?flex:'none';
  });
  document.getElementById('boardRow').style.justifyContent=show?'center':'';
  document.getElementById('puLegend').style.display=show?'flex':'none';
}

function setupMode(){
  const sub=document.getElementById('mainSub');
  const ss=document.getElementById('snakeSpeed');
  ss.style.display='none';
  setDpad(false);
  if(mode==='snake'){
    document.getElementById('mainTitle').textContent='Snake рҹҗҚ';
    sub.textContent=lang==='en'?'Eat, grow, survive!':'еҗғпјҢй•ҝеӨ§пјҢз”ҹеӯҳпјҒ';
    ss.style.display='flex';
    setDpad(true);
    document.onkeydown=onSnakeKey;
  } else if(mode==='match3'){
    document.getElementById('mainTitle').textContent='Match 3 рҹ’Һ';

    document.onkeydown=null;
  } else if(mode==='lian'){
    document.getElementById('mainTitle').textContent='Connect рҹҖ„';

    document.onkeydown=null;
  } else if(mode==='mole'){
    document.getElementById('mainTitle').textContent='Whack-a-Mole рҹҗ№';
    sub.textContent=lang==='en'?'Hit the moles! 30s':'жү“ең°йј пјҒ30з§’';
    document.onkeydown=null;
  }
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// SNAKE  (Power-up edition)
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const SN_COLS=20, SN_ROWS=20, SN_CELL=26;
const SN_W=SN_COLS*SN_CELL, SN_H=SN_ROWS*SN_CELL;
let snakeBaseSpeed=180; // user-chosen base (ms per step)

// Power-up definitions
const POWERUPS=[
  {type:'fast',  emoji:'вҡЎ', glow:'#ffd43b', label:'Speed Up!', timed:true,  secs:4},
  {type:'slow',  emoji:'рҹҗў', glow:'#74c0fc', label:'Slow Mo!',  timed:true,  secs:5},
  {type:'short', emoji:'вңӮпёҸ', glow:'#f783ac', label:'Snip!',     timed:false, secs:0},
  {type:'star',  emoji:'вӯҗ', glow:'#ffe566', label:'+5 Bonus!', timed:false, secs:0},
  {type:'shield',emoji:'рҹӣЎпёҸ', glow:'#63e6be', label:'Shield!',  timed:false, secs:0},
  {type:'bomb',  emoji:'рҹ’Ј', glow:'#ff8787', label:'Boom! -2',  timed:false, secs:0, bad:true},
];
const PU_LIFETIME_MIN=6000, PU_LIFETIME_MAX=10000;
const PU_BLINK_BELOW=2500; // ms remaining when blink starts
const SPAWN_STEPS_MIN=22, SPAWN_STEPS_MAX=40;

function setSnakeSpeed(btn){
  document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  snakeBaseSpeed=parseInt(btn.dataset.spd);
  if(G.started&&!G.over) resetSnakeLoop();
}

function effectiveSpeed(){
  let s=snakeBaseSpeed;
  if(G.eff.fast) s=Math.max(45, Math.round(s*0.45));
  if(G.eff.slow) s=Math.min(480, Math.round(s*2.2));
  return s;
}

function resetSnakeLoop(){
  stopLoop();
  if(G.started&&!G.over) gameLoop=setInterval(snakeStep,effectiveSpeed());
}

function initSnake(){
  cvs.width=SN_W; cvs.height=SN_H; cvs.style.cursor='default';
  cvs.onclick=snakeStart;
  G={
    snake:[{r:10,c:10},{r:10,c:9},{r:10,c:8}],
    dir:{dc:1,dr:0}, next:{dc:1,dr:0},
    food:null, score:0, over:false, started:false,
    items:[],           // [{type,r,c,timer,maxTimer}]
    eff:{},             // active timed effects: {fast:msLeft, slow:msLeft}
    shield:false,       // one-use wall pass
    spawnIn:SPAWN_STEPS_MIN, stepCount:0,
    feedback:null,      // {txt, till(ms)}
    spawnNotice:null,   // {txt, till(ms)}
  };
  G.food=snakeNewFood();
  updateScore(0); updatePill(t('ready'));
  renderSnake();
}

function snakeStart(){
  if(G.started||G.over) return;
  G.started=true; cvs.onclick=null;
  updatePill(t('playing'),'pulse');
  gameLoop=setInterval(snakeStep,effectiveSpeed());
}

function snakeNewFood(){
  const occ=snakeOccupied();
  let r,c;
  do{r=Math.floor(Math.random()*SN_ROWS);c=Math.floor(Math.random()*SN_COLS);}
  while(occ.has(r*SN_COLS+c));
  return{r,c};
}

function snakeOccupied(){
  const s=new Set(G.snake.map(s=>s.r*SN_COLS+s.c));
  if(G.food) s.add(G.food.r*SN_COLS+G.food.c);
  (G.items||[]).forEach(it=>s.add(it.r*SN_COLS+it.c));
  return s;
}

function onSnakeKey(e){
  const map={ArrowUp:{dr:-1,dc:0},ArrowDown:{dr:1,dc:0},ArrowLeft:{dr:0,dc:-1},ArrowRight:{dr:0,dc:1},
    w:{dr:-1,dc:0},s:{dr:1,dc:0},a:{dr:0,dc:-1},d:{dr:0,dc:1},
    W:{dr:-1,dc:0},S:{dr:1,dc:0},A:{dr:0,dc:-1},D:{dr:0,dc:1}};
  const d=map[e.key];
  if(!d) return;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  if(!G.started&&!G.over) snakeStart();
  if(d.dr===-G.dir.dr&&d.dc===-G.dir.dc) return;
  G.next=d;
}
function snakeDir(dc,dr){
  if(!G.started&&!G.over) snakeStart();
  if(dr===-G.dir.dr&&dc===-G.dir.dc) return;
  G.next={dr,dc};
}

function snakeStep(){
  const stepMs=effectiveSpeed();

  // в”Җв”Җ tick timed effects в”Җв”Җ
  let speedChanged=false;
  for(const k of Object.keys(G.eff)){
    G.eff[k]-=stepMs;
    if(G.eff[k]<=0){delete G.eff[k];speedChanged=true;}
  }
  if(speedChanged) resetSnakeLoop();

  // в”Җв”Җ tick item lifetimes в”Җв”Җ
  G.items=G.items.filter(it=>{it.timer-=stepMs;return it.timer>0;});

  // в”Җв”Җ spawn new item в”Җв”Җ
  G.stepCount++;
  if(G.stepCount>=G.spawnIn){
    G.stepCount=0;
    G.spawnIn=SPAWN_STEPS_MIN+Math.floor(Math.random()*(SPAWN_STEPS_MAX-SPAWN_STEPS_MIN));
    if(G.items.length<2) spawnPowerup();
  }

  // в”Җв”Җ move head в”Җв”Җ
  G.dir=G.next;
  const head=G.snake[0];
  let nr=head.r+G.dir.dr, nc=head.c+G.dir.dc;

  // wall collision вҶ’ shield wraps once
  if(nr<0||nr>=SN_ROWS||nc<0||nc>=SN_COLS){
    if(G.shield){
      G.shield=false;
      nr=((nr%SN_ROWS)+SN_ROWS)%SN_ROWS;
      nc=((nc%SN_COLS)+SN_COLS)%SN_COLS;
      snakeFeedback('рҹӣЎпёҸ Wall pass!');
    } else {
      return snakeDie();
    }
  }
  // self collision
  if(G.snake.some(s=>s.r===nr&&s.c===nc)) return snakeDie();

  G.snake.unshift({r:nr,c:nc});

  // в”Җв”Җ eat food в”Җв”Җ
  if(nr===G.food.r&&nc===G.food.c){
    G.score++;
    updateScore(G.score);
    G.food=snakeNewFood();
    if(G.score%5===0){snakeBaseSpeed=Math.max(60,snakeBaseSpeed-12);resetSnakeLoop();}
  } else {
    G.snake.pop();
  }

  // в”Җв”Җ eat power-up в”Җв”Җ
  const hitIdx=G.items.findIndex(it=>it.r===nr&&it.c===nc);
  if(hitIdx>=0){
    const it=G.items.splice(hitIdx,1)[0];
    applyPowerup(it.type);
  }

  renderSnake();
}

function snakeDie(){
  G.over=true; stopLoop();
  updatePill(t('gameOver'),'over');
  renderSnake();
  setTimeout(()=>showWin('рҹҳө',t('gameOver'),'lose',`${t('score')}: ${G.score}`),400);
}

function spawnPowerup(){
  const occ=snakeOccupied();
  const empty=[];
  for(let r=2;r<SN_ROWS-2;r++) for(let c=2;c<SN_COLS-2;c++) if(!occ.has(r*SN_COLS+c)) empty.push([r,c]);
  if(!empty.length) return;
  const [r,c]=empty[Math.floor(Math.random()*empty.length)];
  // weighted pool: bomb is rare (1/8)
  const pool=[...POWERUPS,...POWERUPS,...POWERUPS,POWERUPS[5]]; // bomb appears ~3/21
  // actually: pool of types weighted
  const weights=[3,3,3,3,3,1]; // fast/slow/short/star/shield : bomb = 15:1 вҶ’ simpler:
  const typePool=[];
  POWERUPS.forEach((pu,i)=>{ for(let j=0;j<(pu.bad?1:3);j++) typePool.push(pu);});
  const pu=typePool[Math.floor(Math.random()*typePool.length)];
  const maxTimer=PU_LIFETIME_MIN+Math.floor(Math.random()*(PU_LIFETIME_MAX-PU_LIFETIME_MIN));
  G.items.push({type:pu.type,r,c,timer:maxTimer,maxTimer});
  // notify player a new item appeared
  const desc={fast:'Speed Up! 4s',slow:'Slow Mo! 5s',short:'Snip! shorter',star:'+5 Bonus!',shield:'Shield! wall pass',bomb:'рҹ’Ј Bomb! Avoid!'};
  snakeSpawnNotice(pu.emoji+' '+desc[pu.type]);
}

function snakeSpawnNotice(txt){
  G.spawnNotice={txt,till:Date.now()+2200};
}

function applyPowerup(type){
  const pu=POWERUPS.find(p=>p.type===type);
  switch(type){
    case 'fast':
      G.eff.fast=(pu.secs*1000); resetSnakeLoop();
      snakeFeedback('вҡЎ Speed Up!');break;
    case 'slow':
      G.eff.slow=(pu.secs*1000); resetSnakeLoop();
      snakeFeedback('рҹҗў Slow Mo!');break;
    case 'short':
      G.snake=G.snake.slice(0,Math.max(2,Math.floor(G.snake.length/2)));
      G.score+=2; updateScore(G.score);
      snakeFeedback('вңӮпёҸ Snip! +2');break;
    case 'star':
      G.score+=5; updateScore(G.score);
      snakeFeedback('вӯҗ +5 Bonus!');break;
    case 'shield':
      G.shield=true;
      snakeFeedback('рҹӣЎпёҸ Shield ready!');break;
    case 'bomb':
      G.snake=G.snake.slice(0,Math.max(2,G.snake.length-3));
      G.score=Math.max(0,G.score-2); updateScore(G.score);
      snakeFeedback('рҹ’Ј Boom! -2');break;
  }
}

function snakeFeedback(txt){
  G.feedback={txt, till:Date.now()+1800};
}

const FOOD_EMOJIS=['рҹҚҺ','рҹҚҠ','рҹҚӢ','рҹҚҮ','рҹҚ“','рҹҚү'];
const EMOJI_FONT=`"Segoe UI Emoji","Apple Color Emoji","Noto Color Emoji",serif`;
function renderSnake(){
  ctx.fillStyle='#1a3a1a'; ctx.fillRect(0,0,SN_W,SN_H);

  // grid dots
  ctx.fillStyle='rgba(255,255,255,0.06)';
  for(let r=0;r<SN_ROWS;r++) for(let c=0;c<SN_COLS;c++){
    ctx.fillRect(c*SN_CELL+SN_CELL/2-1,r*SN_CELL+SN_CELL/2-1,2,2);
  }

  // в”Җв”Җ food в”Җв”Җ
  const fi=G.score%FOOD_EMOJIS.length;
  const fx=G.food.c*SN_CELL+SN_CELL/2, fy=G.food.r*SN_CELL+SN_CELL/2;
  ctx.fillStyle='rgba(255,230,80,0.3)';
  ctx.beginPath();ctx.arc(fx,fy,SN_CELL*.46,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.95)';
  ctx.font=`${SN_CELL+2}px ${EMOJI_FONT}`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(FOOD_EMOJIS[fi],fx,fy+1);

  // в”Җв”Җ power-up items в”Җв”Җ
  const now=Date.now();
  G.items.forEach(it=>{
    const pct=it.timer/it.maxTimer;
    const blinking=it.timer<PU_BLINK_BELOW;
    // blink rate: 400ms cycle when first blinking, 200ms when nearly gone
    const blinkRate=it.timer<1200?200:400;
    if(blinking&&(now%blinkRate)<blinkRate*.45) return; // skip = invisible frame
    const pu=POWERUPS.find(p=>p.type===it.type);
    const ix=it.c*SN_CELL+SN_CELL/2, iy=it.r*SN_CELL+SN_CELL/2;
    // glow bg
    const alpha=blinking?0.45:0.7;
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.fillStyle=pu.glow;
    ctx.beginPath();ctx.arc(ix,iy,SN_CELL*.46,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    ctx.restore();
    // emoji
    ctx.fillStyle='rgba(255,255,255,0.95)';
    ctx.font=`${SN_CELL+2}px ${EMOJI_FONT}`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(pu.emoji,ix,iy+1);
    // timer ring
    ctx.strokeStyle=pu.glow; ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(ix,iy,SN_CELL*.46,-Math.PI/2,-Math.PI/2+Math.PI*2*pct);ctx.stroke();
  });

  // в”Җв”Җ snake body в”Җв”Җ
  const hasShield=G.shield;
  G.snake.forEach((seg,i)=>{
    const x=seg.c*SN_CELL, y=seg.r*SN_CELL;
    if(i===0){
      // head colour changes with active effects
      let headColor='#4ecc6a';
      if(G.eff.fast) headColor='#ffd43b';
      else if(G.eff.slow) headColor='#74c0fc';
      ctx.fillStyle=headColor;
      roundRect(ctx,x+1,y+1,SN_CELL-2,SN_CELL-2,5); ctx.fill();
      if(hasShield){
        ctx.strokeStyle='#63e6be'; ctx.lineWidth=2;
        roundRect(ctx,x+1,y+1,SN_CELL-2,SN_CELL-2,5); ctx.stroke();
      }
      const ex=x+SN_CELL*.28, ex2=x+SN_CELL*.72, ey=y+SN_CELL*.38, er=SN_CELL*.1;
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(ex,ey,er,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(ex2,ey,er,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#111';
      ctx.beginPath();ctx.arc(ex+er*.2,ey+er*.2,er*.55,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(ex2+er*.2,ey+er*.2,er*.55,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#1a5a2a'; ctx.lineWidth=1.5; ctx.lineCap='round';
      ctx.beginPath();ctx.arc(x+SN_CELL/2,y+SN_CELL*.62,SN_CELL*.15,0,Math.PI);ctx.stroke();
    } else {
      const t2=i/G.snake.length;
      let hue=130-t2*20;
      if(G.eff.fast) hue=45;
      else if(G.eff.slow) hue=210;
      ctx.fillStyle=`hsl(${hue},${70-t2*20}%,${40+t2*10}%)`;
      roundRect(ctx,x+2,y+2,SN_CELL-4,SN_CELL-4,4); ctx.fill();
    }
  });

  // в”Җв”Җ active effects HUD (top-left) в”Җв”Җ
  let hudX=4;
  Object.entries(G.eff).forEach(([k,ms])=>{
    const pu=POWERUPS.find(p=>p.type===k);
    const pct=ms/(pu.secs*1000);
    ctx.fillStyle='rgba(0,0,0,0.4)';
    roundRect(ctx,hudX,4,30,34,6); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.font=`18px ${EMOJI_FONT}`;
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText(pu.emoji,hudX+15,6);
    // bar
    ctx.fillStyle='#333'; ctx.fillRect(hudX+2,28,26,4);
    ctx.fillStyle=pct>0.5?'#4ecc6a':'#ffa94d';
    ctx.fillRect(hudX+2,28,26*pct,4);
    hudX+=34;
  });
  if(G.shield){
    ctx.fillStyle='rgba(0,0,0,0.4)';
    roundRect(ctx,hudX,4,30,34,6); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.font=`18px ${EMOJI_FONT}`;
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText('рҹӣЎпёҸ',hudX+15,6);
    hudX+=34;
  }

  // в”Җв”Җ collected item feedback (centre, fades out) в”Җв”Җ
  if(G.feedback&&G.feedback.till>now){
    const alpha=Math.min(1,(G.feedback.till-now)/400);
    ctx.globalAlpha=alpha;
    ctx.fillStyle='#fff';
    ctx.font='bold 18px Nunito,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(G.feedback.txt,SN_W/2,SN_H*.22);
    ctx.globalAlpha=1;
  }

  // в”Җв”Җ spawn notice (bottom strip, slides in) в”Җв”Җ
  if(G.spawnNotice&&G.spawnNotice.till>now){
    const left=G.spawnNotice.till-now;
    const alpha=Math.min(1,left/350);
    ctx.globalAlpha=alpha*0.92;
    ctx.fillStyle='rgba(10,30,10,0.7)';
    ctx.fillRect(0,SN_H-28,SN_W,28);
    ctx.fillStyle='#fff';
    ctx.font='bold 13px Nunito,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('вңЁ '+G.spawnNotice.txt,SN_W/2,SN_H-14);
    ctx.globalAlpha=1;
  }

  // в”Җв”Җ start hint в”Җв”Җ
  if(!G.started&&!G.over){
    ctx.fillStyle='rgba(0,0,0,0.52)';
    ctx.fillRect(0,SN_H/2-30,SN_W,60);
    ctx.fillStyle='#fff'; ctx.font='bold 15px Nunito,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(lang==='en'?'Press arrow key or tap to start':'жҢүж–№еҗ‘й”®жҲ–зӮ№еҮ»ејҖе§Ӣ',SN_W/2,SN_H/2);
  }
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// MATCH-3
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const M3_ROWS=8, M3_COLS=8;
let M3_CELL;
const M3_GEMS=['рҹҚҺ','рҹҚҠ','рҹҚӢ','рҹҚҮ','рҹ«җ','рҹҚ“'];
const M3_COLORS=['#ff6b6b','#ffa94d','#ffd43b','#cc5de8','#4dabf7','#f783ac'];

function initMatch3(){
  M3_CELL=Math.min(52, Math.floor((Math.min(window.innerWidth-32,440))/M3_COLS));
  const W=M3_CELL*M3_COLS, H=M3_CELL*M3_ROWS;
  cvs.width=W; cvs.height=H; cvs.style.cursor='pointer';
  G={board:null, sel:null, score:0, animating:false, combo:0};
  do{ G.board=Array.from({length:M3_ROWS},()=>Array.from({length:M3_COLS},()=>Math.floor(Math.random()*M3_GEMS.length)));
  }while(findM3Matches(G.board).length>0);
  cvs.onclick=m3Click;
  updateScore(0); updatePill(t('playing'));
  renderMatch3();
}

function renderMatch3(){
  const C=M3_CELL;
  ctx.fillStyle='#1a1a2e'; ctx.fillRect(0,0,cvs.width,cvs.height);
  for(let r=0;r<M3_ROWS;r++) for(let c=0;c<M3_COLS;c++){
    const x=c*C, y=r*C;
    const v=G.board[r][c];
    const isSel=G.sel&&G.sel.r===r&&G.sel.c===c;
    // cell bg
    ctx.fillStyle=isSel?'rgba(255,255,255,0.35)':'rgba(255,255,255,0.08)';
    roundRect(ctx,x+2,y+2,C-4,C-4,7); ctx.fill();
    if(v<0) continue;
    if(isSel){ctx.strokeStyle='#fff';ctx.lineWidth=2.5;roundRect(ctx,x+2,y+2,C-4,C-4,7);ctx.stroke();}
    // gem circle
    ctx.fillStyle=M3_COLORS[v];
    ctx.beginPath();ctx.arc(x+C/2,y+C/2,C*.35,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.beginPath();ctx.arc(x+C*.38,y+C*.38,C*.1,0,Math.PI*2);ctx.fill();
    // emoji
    ctx.font=`${C*.38}px serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(M3_GEMS[v],x+C/2,y+C/2+C*.01);
  }
}

function m3Click(e){
  if(G.animating) return;
  const rect=cvs.getBoundingClientRect();
  const C=M3_CELL;
  const c=Math.floor((e.clientX-rect.left)/C);
  const r=Math.floor((e.clientY-rect.top)/C);
  if(r<0||r>=M3_ROWS||c<0||c>=M3_COLS) return;
  if(!G.sel){G.sel={r,c};renderMatch3();return;}
  const {r:sr,c:sc}=G.sel;
  if(sr===r&&sc===c){G.sel=null;renderMatch3();return;}
  if(Math.abs(r-sr)+Math.abs(c-sc)===1){
    G.sel=null;
    m3Swap(r,c,sr,sc);
  } else {
    G.sel={r,c}; renderMatch3();
  }
}

function m3Swap(r1,c1,r2,c2){
  G.animating=true;
  const tmp=G.board[r1][c1]; G.board[r1][c1]=G.board[r2][c2]; G.board[r2][c2]=tmp;
  const matches=findM3Matches(G.board);
  if(!matches.length){
    // swap back
    const tmp2=G.board[r1][c1]; G.board[r1][c1]=G.board[r2][c2]; G.board[r2][c2]=tmp2;
    G.animating=false; renderMatch3(); return;
  }
  G.combo=0;
  m3ProcessMatches();
}

function findM3Matches(board){
  const matched=new Set();
  // horizontal
  for(let r=0;r<M3_ROWS;r++) for(let c=0;c<M3_COLS-2;c++){
    const v=board[r][c]; if(v<0) continue;
    if(board[r][c+1]===v&&board[r][c+2]===v){
      let len=3;while(c+len<M3_COLS&&board[r][c+len]===v)len++;
      for(let k=0;k<len;k++) matched.add(r*M3_COLS+c+k);
    }
  }
  // vertical
  for(let c=0;c<M3_COLS;c++) for(let r=0;r<M3_ROWS-2;r++){
    const v=board[r][c]; if(v<0) continue;
    if(board[r+1][c]===v&&board[r+2][c]===v){
      let len=3;while(r+len<M3_ROWS&&board[r+len][c]===v)len++;
      for(let k=0;k<len;k++) matched.add((r+k)*M3_COLS+c);
    }
  }
  return [...matched];
}

function m3ProcessMatches(){
  const matches=findM3Matches(G.board);
  if(!matches.length){G.animating=false;renderMatch3();checkM3Stuck();return;}
  G.combo++;
  const pts=matches.length*(G.combo>1?G.combo*2:1);
  G.score+=pts; updateScore(G.score);
  matches.forEach(idx=>G.board[Math.floor(idx/M3_COLS)][idx%M3_COLS]=-1);
  renderMatch3();
  setTimeout(()=>{
    // gravity
    for(let c=0;c<M3_COLS;c++){
      const col=G.board.map(r=>r[c]).filter(v=>v>=0);
      while(col.length<M3_ROWS) col.unshift(Math.floor(Math.random()*M3_GEMS.length));
      for(let r=0;r<M3_ROWS;r++) G.board[r][c]=col[r];
    }
    renderMatch3();
    setTimeout(m3ProcessMatches,200);
  },300);
}

function checkM3Stuck(){
  // Check if any swap produces a match
  const dirs=[[0,1],[1,0]];
  for(let r=0;r<M3_ROWS;r++) for(let c=0;c<M3_COLS;c++) for(const[dr,dc] of dirs){
    const nr=r+dr,nc=c+dc; if(nr>=M3_ROWS||nc>=M3_COLS) continue;
    const b=G.board.map(row=>[...row]);
    const tmp=b[r][c]; b[r][c]=b[nr][nc]; b[nr][nc]=tmp;
    if(findM3Matches(b).length>0) return;
  }
  // No moves вҖ” reshuffle
  updatePill(lang==='en'?'ReshufflingвҖҰ':'йҮҚж–°жҙ—зүҢвҖҰ');
  setTimeout(()=>{
    do{G.board=Array.from({length:M3_ROWS},()=>Array.from({length:M3_COLS},()=>Math.floor(Math.random()*M3_GEMS.length)));}
    while(findM3Matches(G.board).length>0);
    renderMatch3(); updatePill(t('playing'));
  },600);
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// LIANLIANKAN (иҝһиҝһзңӢ)
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const LL_COLS=8, LL_ROWS=6;
const LL_EMOJIS=['рҹҗұ','рҹҗ¶','рҹҗё','рҹҰҠ','рҹҗј','рҹҗЁ','рҹҰҒ','рҹҗҜ','рҹҗҷ','рҹҰӢ','рҹҢё','вӯҗ'];
let LL_CELL;

function initLian(){
  LL_CELL=Math.min(62, Math.floor((Math.min(window.innerWidth-32,520))/(LL_COLS+2)));
  const W=(LL_COLS+2)*LL_CELL, H=(LL_ROWS+2)*LL_CELL;
  cvs.width=W; cvs.height=H; cvs.style.cursor='pointer';
  // board: (LL_ROWS+2) x (LL_COLS+2), border=0, inner has pairs
  const totalCells=LL_ROWS*LL_COLS; // 48 cells = 24 pairs
  const pairs=totalCells/2;
  const emojis=[];
  for(let i=0;i<pairs;i++) emojis.push(i%LL_EMOJIS.length, i%LL_EMOJIS.length);
  shuffle(emojis);
  G={
    board:Array.from({length:LL_ROWS+2},()=>Array(LL_COLS+2).fill(0)),
    sel:null, score:0, remaining:totalCells, flash:null
  };
  let idx=0;
  for(let r=1;r<=LL_ROWS;r++) for(let c=1;c<=LL_COLS;c++) G.board[r][c]=emojis[idx++]+1;
  cvs.onclick=lianClick;
  updateScore(0); updatePill(t('playing'));
  renderLian();
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function renderLian(){
  const C=LL_CELL;
  const rows=LL_ROWS+2, cols=LL_COLS+2;
  ctx.fillStyle='#1a2a3a'; ctx.fillRect(0,0,cvs.width,cvs.height);
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const v=G.board[r][c];
    const x=c*C, y=r*C;
    if(r===0||r===rows-1||c===0||c===cols-1) continue; // border
    const isSel=G.sel&&G.sel[0]===r&&G.sel[1]===c;
    if(v===0){
      // empty cell
      ctx.fillStyle='rgba(255,255,255,0.04)';
      roundRect(ctx,x+3,y+3,C-6,C-6,6); ctx.fill();
      continue;
    }
    // tile
    ctx.fillStyle=isSel?'#ffe066':'rgba(255,255,255,0.9)';
    roundRect(ctx,x+3,y+3,C-6,C-6,8); ctx.fill();
    if(isSel){ctx.strokeStyle='#f4a94e';ctx.lineWidth=2.5;roundRect(ctx,x+3,y+3,C-6,C-6,8);ctx.stroke();}
    ctx.font=`${C*.5}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(LL_EMOJIS[(v-1)%LL_EMOJIS.length],x+C/2,y+C/2);
  }
  // draw flash path
  if(G.flash){
    ctx.strokeStyle='rgba(255,200,60,0.85)'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.beginPath();
    G.flash.forEach(([r2,c2],i)=>{
      const x=c2*C+C/2, y=r2*C+C/2;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.stroke();
  }
}

function lianClick(e){
  const rect=cvs.getBoundingClientRect();
  const C=LL_CELL;
  const c=Math.floor((e.clientX-rect.left)/C);
  const r=Math.floor((e.clientY-rect.top)/C);
  if(r<1||r>LL_ROWS||c<1||c>LL_COLS) return;
  if(G.board[r][c]===0) return;
  if(!G.sel){G.sel=[r,c];renderLian();return;}
  const [sr,sc]=G.sel;
  if(sr===r&&sc===c){G.sel=null;renderLian();return;}
  if(G.board[r][c]!==G.board[sr][sc]){G.sel=[r,c];renderLian();return;}
  const path=lianFindPath(sr,sc,r,c);
  if(path){
    G.flash=path;
    G.board[sr][sc]=0; G.board[r][c]=0;
    G.remaining-=2; G.sel=null;
    G.score+=10; updateScore(G.score);
    renderLian();
    setTimeout(()=>{
      G.flash=null;
      if(G.remaining===0){
        renderLian();
        setTimeout(()=>showWin('рҹҺү',t('youWin'),'',`${t('score')}: ${G.score}`),200);
      } else {
        if(!lianHasMoves()) lianHint();
        renderLian();
      }
    },400);
  } else {
    G.sel=[r,c]; renderLian();
  }
}

// BFS with turn count вүӨ 2
function lianFindPath(r1,c1,r2,c2){
  const rows=LL_ROWS+2, cols=LL_COLS+2;
  // State: (r, c, lastDir, turns)
  // lastDir: -1=none, 0=up, 1=down, 2=left, 3=right
  const dirs=[[-1,0],[1,0],[0,-1],[0,1]];
  const key=(r,c,d,t)=>`${r},${c},${d},${t}`;
  const visited=new Set();
  // BFS queue: {r,c,dir,turns,path}
  const queue=[{r:r1,c:c1,dir:-1,turns:0,path:[[r1,c1]]}];
  while(queue.length){
    const {r,c,dir,turns,path}=queue.shift();
    for(let d=0;d<4;d++){
      const nr=r+dirs[d][0], nc=c+dirs[d][1];
      if(nr<0||nr>=rows||nc<0||nc>=cols) continue;
      const newTurns=turns+(dir!==-1&&d!==dir?1:0);
      if(newTurns>2) continue;
      const k=key(nr,nc,d,newTurns);
      if(visited.has(k)) continue;
      visited.add(k);
      const newPath=[...path,[nr,nc]];
      if(nr===r2&&nc===c2) return newPath;
      // can only traverse empty cells (except dest)
      if(G.board[nr][nc]!==0) continue;
      queue.push({r:nr,c:nc,dir:d,turns:newTurns,path:newPath});
    }
  }
  return null;
}

function lianHasMoves(){
  for(let r1=1;r1<=LL_ROWS;r1++) for(let c1=1;c1<=LL_COLS;c1++){
    if(!G.board[r1][c1]) continue;
    for(let r2=1;r2<=LL_ROWS;r2++) for(let c2=1;c2<=LL_COLS;c2++){
      if(r1===r2&&c1===c2) continue;
      if(G.board[r1][c1]!==G.board[r2][c2]) continue;
      if(lianFindPath(r1,c1,r2,c2)) return true;
    }
  }
  return false;
}

function lianHint(){
  // Shuffle inner tiles
  updatePill(lang==='en'?'ShufflingвҖҰ':'йҮҚжҺ’дёӯвҖҰ');
  const tiles=[];
  for(let r=1;r<=LL_ROWS;r++) for(let c=1;c<=LL_COLS;c++) if(G.board[r][c]) tiles.push(G.board[r][c]);
  shuffle(tiles);
  let idx=0;
  for(let r=1;r<=LL_ROWS;r++) for(let c=1;c<=LL_COLS;c++) if(G.board[r][c]) G.board[r][c]=tiles[idx++];
  setTimeout(()=>updatePill(t('playing')),600);
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// WHACK-A-MOLE
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const WM_COLS=3, WM_ROWS=3;
let WM_CELL;
const WM_MOLE_EMOJIS=['рҹҗ№','рҹҗӯ','рҹҗ°','рҹҰ”'];

function initMole(){
  WM_CELL=Math.min(130, Math.floor((Math.min(window.innerWidth-32,420))/WM_COLS));
  const W=WM_CELL*WM_COLS, H=WM_CELL*WM_ROWS;
  cvs.width=W; cvs.height=H; cvs.style.cursor='pointer';
  G={
    moles:Array.from({length:WM_ROWS},()=>Array(WM_COLS).fill(0)), // 0=hidden,1=up,2=hit
    score:0, timeLeft:30, over:false, speed:1400,
    moleTimers:[], // per-hole countdown
  };
  cvs.onclick=moleClick;
  updateScore(0);
  updatePill('30s вҸұпёҸ');
  renderMole();
  // start countdown
  const timerTick=setInterval(()=>{
    G.timeLeft--;
    updatePill(G.timeLeft+'s вҸұпёҸ');
    if(G.timeLeft<=0){
      clearInterval(timerTick); stopLoop();
      G.moleTimers.forEach(t=>clearTimeout(t));
      G.over=true; cvs.style.cursor='default';
      renderMole();
      setTimeout(()=>showWin('рҹҗ№',t('gameOver'),'',`${t('score')}: ${G.score}`),300);
    }
    // increase speed over time
    if(G.timeLeft===20) G.speed=1100;
    if(G.timeLeft===10) G.speed=800;
  },1000);
  G.moleTimers.push(timerTick);
  // start popping moles
  gameLoop=setInterval(molePopRandom,600);
}

function molePopRandom(){
  if(G.over) return;
  // find a hidden hole
  const hidden=[];
  for(let r=0;r<WM_ROWS;r++) for(let c=0;c<WM_COLS;c++) if(G.board&&G.moles[r][c]===0) hidden.push([r,c]);
  // actually just pick a random hole ignoring state if all occupied
  const r=Math.floor(Math.random()*WM_ROWS), c=Math.floor(Math.random()*WM_COLS);
  if(G.moles[r][c]!==0) return;
  G.moles[r][c]=1;
  renderMole();
  const t=setTimeout(()=>{
    if(G.moles[r][c]===1){G.moles[r][c]=0;renderMole();}
  }, G.speed);
  G.moleTimers.push(t);
}

function moleClick(e){
  if(G.over) return;
  const rect=cvs.getBoundingClientRect();
  const C=WM_CELL;
  const c=Math.floor((e.clientX-rect.left)/C);
  const r=Math.floor((e.clientY-rect.top)/C);
  if(r<0||r>=WM_ROWS||c<0||c>=WM_COLS) return;
  if(G.moles[r][c]===1){
    G.moles[r][c]=2; // hit
    G.score++; updateScore(G.score);
    renderMole();
    setTimeout(()=>{if(G.moles[r][c]===2){G.moles[r][c]=0;renderMole();}},250);
  }
}

function renderMole(){
  const C=WM_CELL;
  // background
  ctx.fillStyle='#3a7a2a'; ctx.fillRect(0,0,cvs.width,cvs.height);
  // grass pattern
  ctx.fillStyle='#4a9a3a';
  for(let r=0;r<WM_ROWS;r++) for(let c=0;c<WM_COLS;c++){
    if((r+c)%2===0){ctx.fillRect(c*C,r*C,C,C);}
  }
  // holes & moles
  for(let r=0;r<WM_ROWS;r++) for(let c=0;c<WM_COLS;c++){
    const x=c*C+C/2, y=r*C+C/2;
    const state=G.moles[r][c];
    // hole (dark oval)
    ctx.fillStyle='#1a3a10';
    ctx.beginPath();ctx.ellipse(x,y+C*.1,C*.38,C*.18,0,0,Math.PI*2);ctx.fill();
    if(state>0){
      // mole body
      const hitColor=state===2?'#ff6060':'#c07040';
      ctx.fillStyle=hitColor;
      ctx.beginPath();ctx.ellipse(x,y-C*.08,C*.3,C*.36,0,0,Math.PI*2);ctx.fill();
      // mole face emoji
      ctx.font=`${C*.52}px serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      const emoji=state===2?'рҹҳө':WM_MOLE_EMOJIS[Math.floor(G.score/3)%WM_MOLE_EMOJIS.length];
      ctx.fillText(emoji,x,y-C*.1);
      // stars on hit
      if(state===2){
        ctx.font=`${C*.22}px serif`;
        ctx.fillText('вӯҗ',x-C*.38,y-C*.45);
        ctx.fillText('вңЁ',x+C*.3,y-C*.5);
      }
    }
  }
  if(G.over){
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,cvs.width,cvs.height);
    ctx.fillStyle='#fff';ctx.font=`bold ${C*.28}px Nunito,sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(t('gameOver'),cvs.width/2,cvs.height/2);
  }
}

setupMode();
newGame();
applyLang();
